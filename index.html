const genId = () => Math.random().toString(36).slice(2,9).toUpperCase();

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const [pantalla,setPantalla]=useState(()=>getSessionId()?"unirse":"login");
  const [operario,setOperario]=useState(null);
  const [pedidos,setPedidos]=useState([]);
  const [marcaIdx,setMarcaIdx]=useState(0);
  const [mostrarResumenFinal,setMostrarResumenFinal]=useState(false);
  const [tab,setTab]=useState("picking");
  const [modifs,setModifs]=useState([]);
  const [sessionId,setSessionId]=useState(getSessionId);
  const [conectados,setConectados]=useState({});
  const [fbStatus,setFbStatus]=useState("offline");
  const [linkCopiado,setLinkCopiado]=useState(false);
  const escuchando=useRef(false);

  // Escuchar sesión Firebase en tiempo real
  useEffect(()=>{
    if(!sessionId||pantalla!=="main"||escuchando.current) return;
    escuchando.current=true;
    setFbStatus("conectando");
    const ref=window.db.ref(`sesiones/${sessionId}`);
    ref.on("value",snap=>{
      const data=snap.val();
      if(!data){setFbStatus("offline");return;}
      setFbStatus("online");
      if(data.pedidos) setPedidos(Object.values(data.pedidos));
      // marcaIdx NO se lee de Firebase — cada operario navega su propia marca
      if(data.modifs) setModifs(Object.values(data.modifs));
    });
    return()=>{ref.off();escuchando.current=false;};
  },[sessionId,pantalla]);

  // Heartbeat: registrar operario activo
  useEffect(()=>{
    if(!sessionId||!operario) return;
    const ref=window.db.ref(`sesiones/${sessionId}/conectados/${operario}`);
    ref.set(Date.now());
    ref.onDisconnect().remove();
    const t=setInterval(()=>ref.set(Date.now()),8000);
    return()=>{clearInterval(t);ref.remove();};
  },[sessionId,operario]);

  // Escuchar quién está conectado
  useEffect(()=>{
    if(!sessionId) return;
    const ref=window.db.ref(`sesiones/${sessionId}/conectados`);
    ref.on("value",snap=>setConectados(snap.val()||{}));
    return()=>ref.off();
  },[sessionId]);

  // Escribir pedidos a Firebase
  const fbSetPedidos=useCallback((updater)=>{
    setPedidos(prev=>{
      const next=typeof updater==="function"?updater(prev):updater;
      if(!sessionId) return next;
      const obj={};
      next.forEach(p=>{obj[`p${p.id}`]=p;});
      window.db.ref(`sesiones/${sessionId}/pedidos`).set(obj);
      return next;
    });
  },[sessionId]);

  const fbSetMarcaIdx=useCallback((idx)=>{
    if(idx>=ORDEN_MARCAS.length){setMostrarResumenFinal(true);return;}
    setMarcaIdx(idx);
    setTab("picking");
  },[]);

  const fbAddModif=useCallback((m)=>{
    setModifs(prev=>{
      // Reemplazar faltantes de una marca en una sola operación atómica (evita duplicados)
      if(m._reemplazarFaltantesMarca){
        const marcaId=m._reemplazarFaltantesMarca;
        const sinEsta=prev.filter(x=>!(
          (x.tipo==="distribucion"||x.tipo==="picking")&&x.tipoMod==="faltante"&&
          PRODUCTOS.find(p=>p.id===x.productoId)?.marcaId===marcaId));
        const next=[...sinEsta,...(m.nuevosFaltantes||[])];
        if(sessionId){const obj={};next.forEach((x,i)=>{obj[`m${i}`]=x;});window.db.ref(`sesiones/${sessionId}/modifs`).set(obj);}
        return next;
      }
      // Soporte legado para limpiar modifs de una marca
      if(m._limpiarMarca){
        const next=prev.filter(x=>!(
          (x.tipo==="distribucion"||x.tipo==="picking")&&x.tipoMod==="faltante"&&
          PRODUCTOS.find(p=>p.id===x.productoId)?.marcaId===m._limpiarMarca));
        if(sessionId){const obj={};next.forEach((x,i)=>{obj[`m${i}`]=x;});window.db.ref(`sesiones/${sessionId}/modifs`).set(obj);}
        return next;
      }
      const next=[...prev,m];
      if(sessionId){const obj={};next.forEach((x,i)=>{obj[`m${i}`]=x;});window.db.ref(`sesiones/${sessionId}/modifs`).set(obj);}
      return next;
    });
  },[sessionId]);

  // Locking para picking simultáneo: transacción Firebase
  const claimItem=useCallback((pedidoId,op,onSuccess,onFail)=>{
    if(!sessionId){onSuccess();return;}
    const ref=window.db.ref(`sesiones/${sessionId}/locks/p${pedidoId}`);
    ref.transaction(cur=>{
      if(cur&&Date.now()-cur.ts<10000) return; // tomado hace menos de 10s
      return {by:op,ts:Date.now()};
    },(err,committed)=>{
      if(committed) onSuccess();
      else if(onFail) onFail();
    });
  },[sessionId]);

  // Confirmación atómica — evita doble-confirmación simultánea
  const confirmarItemAtomico=useCallback((pedidoId,cantReal,extraData,onExito,onRechazado)=>{
    // Sin sesión Firebase: confirmar directo, nunca rechazar
    if(!sessionId){
      setPedidos(prev=>prev.map(p=>p.id===pedidoId?{...p,...extraData,entregado:cantReal}:p));
      onExito&&onExito(cantReal);
      return;
    }
    // Con sesión Firebase real: transacción atómica anti-duplicado
    const ref=window.db.ref(`sesiones/${sessionId}/pedidos/p${pedidoId}`);
    ref.transaction(actual=>{
      if(!actual) return actual;
      const yaEntregado=actual.entregado||0;
      const cantidad=actual.cantidad||1;
      // Solo rechazar si YA estaba completo antes de este intento
      if(yaEntregado>=cantidad) return undefined;
      const cantFinal=Math.min(cantReal, cantidad-yaEntregado);
      return {...actual,...extraData,entregado:yaEntregado+cantFinal,_cantFinal:cantFinal};
    },(err,committed,snapshot)=>{
      if(err){
        // Error de red: confirmar localmente igual
        setPedidos(prev=>prev.map(p=>p.id===pedidoId?{...p,...extraData,entregado:cantReal}:p));
        onExito&&onExito(cantReal);
        return;
      }
      if(committed&&snapshot){
        const val=snapshot.val();
        const cantFinal=val._cantFinal!==undefined?val._cantFinal:cantReal;
        setPedidos(prev=>prev.map(p=>p.id===pedidoId?{...val,id:pedidoId}:p));
        onExito&&onExito(cantFinal);
      } else {
        // committed=false: la transacción abortó porque yaEntregado>=cantidad
        // Significa que otro operario completó este ítem justo antes
        onRechazado&&onRechazado();
      }
    });
  },[sessionId]);

  const confirmarAsignacion=(pedidosExpandidos)=>{
    const sinPos=pedidosExpandidos.filter(p=>!p.posicion);
    const sin=[...new Set(sinPos.map(p=>p.cliente))];
    if(sin.length>0&&!window.confirm(`⚠️ ${sin.length} cliente/s sin posición:\n${sin.join("\n")}\n\n¿Continuar igual?`)) return false;
    const sid=genId();
    setSessionHash(sid);
    setSessionId(sid);
    const obj={};
    pedidosExpandidos.forEach(p=>{obj[`p${p.id}`]=p;});
    window.db.ref(`sesiones/${sid}`).set({pedidos:obj,marcaIdx:0,modifs:{},creadoPor:operario,ts:Date.now()});
    setPedidos(pedidosExpandidos);
    setModifs([]);           // limpiar modifs viejos de sesión anterior
    escuchando.current=false; // permitir que el useEffect vuelva a escuchar Firebase
    setMarcaIdx(0);
    setPantalla("main");
    return true;
  };

  const marcaActual=ORDEN_MARCAS[marcaIdx];
  const total=pedidos.length;
  const completos=pedidos.filter(p=>estadoItem(p)==="completo").length;
  const pct=total?Math.round(completos/total*100):0;
  const ahora=Date.now();
  const activos=Object.entries(conectados).filter(([,ts])=>ahora-ts<20000).map(([n])=>n);

  const linkSesion=`${window.location.origin}${window.location.pathname}#${sessionId}`;
  const compartir=()=>{
    navigator.clipboard.writeText(linkSesion).then(()=>{setLinkCopiado(true);setTimeout(()=>setLinkCopiado(false),2500);}).catch(()=>alert(linkSesion));
  };

  // ── PANTALLA UNIRSE (abrieron el link) ────────────────────────────────────
  if(pantalla==="unirse") return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{width:"100%",maxWidth:300,textAlign:"center"}}>
        <div style={{fontSize:52,marginBottom:8}}>📦</div>
        <h2 style={{color:"#f8fafc",fontSize:22,fontWeight:900,marginBottom:4}}>Unirse a jornada</h2>
        <div style={{background:"#1e3a5f",borderRadius:8,padding:"6px 14px",display:"inline-block",marginBottom:24}}>
          <span style={{color:"#93c5fd",fontSize:14,fontWeight:800}}>Sesión: {sessionId}</span>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {["Pablo","Brian","David","Adrián"].map(op=>(
            <button key={op} onClick={()=>{setOperario(op);setPantalla("main");}}
              style={{background:"#1e293b",color:"#f8fafc",border:"1px solid #334155",borderRadius:10,padding:"14px",fontSize:16,fontWeight:700,cursor:"pointer"}}>
              👤 {op}
            </button>
          ))}
        </div>
        <button onClick={()=>{window.location.hash="";setPantalla("login");setSessionId(null);}} style={{marginTop:16,background:"transparent",color:"#475569",border:"none",fontSize:12,cursor:"pointer"}}>
          Nueva jornada
        </button>
      </div>
    </div>
  );

  // ── PANTALLA LOGIN ────────────────────────────────────────────────────────
  if(pantalla==="login") return (
    <LoginConRecuperacion
      onLogin={(op)=>{setOperario(op);setPantalla("cargar");}}
      onRetomar={(op,sid)=>{setOperario(op);setSessionId(sid);setSessionHash(sid);setPantalla("main");}}
    />
  );

  if(pantalla==="cargar") return <CargarPedidos onCargar={p=>{setPedidos(p);setPantalla("asignacion");}} onDemo={()=>{setPedidos(generarDemo());setPantalla("asignacion");}} onVolver={()=>setPantalla("login")}/>;
  if(pantalla==="asignacion") return <AsignacionPosiciones pedidos={pedidos} setPedidos={setPedidos} onConfirmar={confirmarAsignacion} onVolver={()=>setPantalla("cargar")}/>;

  // ── PANTALLA MAIN ─────────────────────────────────────────────────────────
  return (
    <div style={{minHeight:"100vh",maxWidth:480,margin:"0 auto",display:"flex",flexDirection:"column"}}>
      {/* Header */}
      <div style={{background:"#1e293b",borderBottom:"1px solid #334155",padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:20}}>📦</span>
          <div>
            <div style={{fontWeight:900,fontSize:14,lineHeight:1}}>WMS Picking</div>
            <div style={{color:"#64748b",fontSize:10}}>👤 {operario}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:3,alignItems:"center"}}>
          {ORDEN_MARCAS.map((m,i)=>{
            const items=pedidos.filter(p=>p.marcaId===m.id);
            const done=items.length>0&&items.every(p=>estadoItem(p)==="completo");
            const active=i===marcaIdx;
            return <div key={m.id} onClick={()=>fbSetMarcaIdx(i)} title={m.label} style={{width:active?24:7,height:7,borderRadius:4,background:done?"#22c55e":active?m.color:"#334155",transition:"all 0.3s",cursor:"pointer"}}/>;
          })}
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <div style={{background:"#0f172a",color:"#3b82f6",borderRadius:7,padding:"4px 9px",fontSize:12,fontWeight:900}}>{pct}%</div>
          <button onClick={()=>{
            if(window.confirm("⚠️ ATENCIÓN\n\nSi volvés al inicio se perderá todo el progreso de la jornada actual.\n\nLos otros operarios también perderán la conexión.\n\n¿Estás seguro que querés volver al inicio?"))
              setPantalla("login");
          }} style={{background:"#0f172a",color:"#475569",border:"1px solid #334155",borderRadius:7,padding:"5px 8px",fontSize:11,cursor:"pointer"}}>⚙️</button>
        </div>
      </div>

      {/* Barra sesión: quién está conectado + compartir */}
      <div style={{background:"#0a0f1a",borderBottom:"1px solid #1e293b",padding:"5px 14px",display:"flex",alignItems:"center",gap:8,minHeight:30}}>
        <div style={{display:"flex",gap:4,flex:1,flexWrap:"wrap"}}>
          {activos.map(n=>(
            <span key={n} style={{background:n===operario?"#1e3a5f":"#1e293b",color:n===operario?"#93c5fd":"#64748b",border:`1px solid ${n===operario?"#3b82f6":"#334155"}`,borderRadius:99,padding:"1px 8px",fontSize:11,fontWeight:700}}>
              {n===operario?"• ":""}{n}
            </span>
          ))}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          <div style={{width:6,height:6,borderRadius:99,background:fbStatus==="online"?"#22c55e":fbStatus==="conectando"?"#f59e0b":"#ef4444"}}/>
          <button onClick={compartir} style={{background:linkCopiado?"#14532d":"#1e293b",color:linkCopiado?"#86efac":"#93c5fd",border:`1px solid ${linkCopiado?"#22c55e":"#3b82f6"}`,borderRadius:6,padding:"3px 9px",fontSize:11,fontWeight:700,cursor:"pointer"}}>
            {linkCopiado?"✓ Copiado":"🔗 Compartir"}
          </button>
        </div>
      </div>

      {/* Marca activa */}
      <div style={{background:`${marcaActual?.bg}cc`,borderBottom:`2px solid ${marcaActual?.color||"#334155"}`,padding:"7px 12px",display:"flex",alignItems:"center",gap:8}}>
        <button onClick={()=>fbSetMarcaIdx(marcaIdx-1)} disabled={marcaIdx===0} style={{background:"transparent",border:"none",color:marcaIdx===0?"#334155":"#94a3b8",fontSize:20,cursor:marcaIdx===0?"default":"pointer",padding:"0 4px",lineHeight:1}}>‹</button>
        <div style={{flex:1,textAlign:"center"}}>
          <div style={{fontSize:10,color:"#64748b",fontWeight:700}}>MARCA ACTIVA · {marcaIdx+1}/{ORDEN_MARCAS.length}</div>
          <div style={{color:marcaActual?.color,fontWeight:900,fontSize:15,lineHeight:1.2}}>{marcaActual?.label}</div>
        </div>
        <button onClick={()=>fbSetMarcaIdx(marcaIdx+1)} disabled={marcaIdx===ORDEN_MARCAS.length-1} style={{background:"transparent",border:"none",color:marcaIdx===ORDEN_MARCAS.length-1?"#334155":"#94a3b8",fontSize:20,cursor:marcaIdx===ORDEN_MARCAS.length-1?"default":"pointer",padding:"0 4px",lineHeight:1}}>›</button>
        <button onClick={()=>setPantalla("asignacion")} style={{background:"#0f172a",color:"#64748b",border:"1px solid #334155",borderRadius:7,padding:"4px 8px",fontSize:10,cursor:"pointer",whiteSpace:"nowrap"}}>🗺️ Pos.</button>
      </div>

      <div style={{height:3,background:"#1e293b"}}><div style={{height:"100%",background:"#3b82f6",width:`${pct}%`,transition:"width 0.5s"}}/></div>

      <div style={{display:"flex",borderBottom:"1px solid #334155",background:"#1e293b"}}>
        {[["picking","🎯 Picking"],["mapa","🗺️ Mapa"],["reporte","📋 Reporte"]].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{flex:1,background:"transparent",color:tab===k?"#3b82f6":"#64748b",border:"none",borderBottom:tab===k?"2px solid #3b82f6":"2px solid transparent",padding:"11px 4px",fontSize:13,fontWeight:700,cursor:"pointer",position:"relative"}}>
            {l}
            {k==="reporte"&&(()=>{const nFalt=modifs.filter(m=>m.tipoMod==="faltante").length;return nFalt>0?<span style={{position:"absolute",top:6,right:6,background:"#ef4444",color:"#fff",borderRadius:99,fontSize:9,fontWeight:900,padding:"1px 5px"}}>{nFalt}</span>:null;})()}
          </button>
        ))}
      </div>

      <div style={{flex:1,overflowY:"auto"}}>
        {tab==="picking"&&mostrarResumenFinal&&<ResumenFinal pedidos={pedidos} modifs={modifs} onIrReporte={()=>{setMostrarResumenFinal(false);setTab("reporte");}}/>}
        {tab==="picking"&&!mostrarResumenFinal&&marcaActual&&(
          marcaActual.tipo==="picking"
            ?<PickingLaFrancia marcaConfig={marcaActual} pedidos={pedidos} setPedidos={fbSetPedidos} onMarcaCompleta={()=>fbSetMarcaIdx(marcaIdx+1)} addModif={fbAddModif} claimItem={claimItem} confirmarItemAtomico={confirmarItemAtomico} operario={operario}/>
            :<Distribucion marcaConfig={marcaActual} pedidos={pedidos} setPedidos={fbSetPedidos} onMarcaCompleta={()=>fbSetMarcaIdx(marcaIdx+1)} addModif={fbAddModif}/>
        )}
        {tab==="mapa"&&<MapaDeposito pedidos={pedidos} setPedidos={fbSetPedidos} addModif={fbAddModif}/>}
        {tab==="reporte"&&<Reporte pedidos={pedidos} modifs={modifs} operario={operario}/>}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
