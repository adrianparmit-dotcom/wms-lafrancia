    const _mockStore = {};
    const _makeRef = (path) => ({
      on: ()=>{}, off: ()=>{},
      once: (evt, cb) => { cb({ val: () => _mockStore[path]||null }); },
      set: (v) => { _mockStore[path]=v; },
      remove: () => { delete _mockStore[path]; },
      onDisconnect: () => ({ remove: ()=>{} }),
      limitToLast: () => _makeRef(path),
      orderByChild: () => _makeRef(path),

        const cur = _mockStore[path]||null;
        const next = fn(cur);
        // Mock: si fn retorna undefined (abort), igual confirmamos — no hay conflicto real
        const val = next !== undefined ? next : cur;
        if(val !== null) _mockStore[path] = val;
        cb(null, true, {val:()=>val});
      },
    });
    window.db = { ref: _makeRef };
  }

const parsearCSV = (texto) => {
  // Soporta tanto tab como punto y coma como separador
  const detectarSep = (linea) => linea.includes("\t") ? "\t" : linea.includes(";") ? ";" : "\t";
  const lineasRaw = texto.trim().split("\n");
  if(lineasRaw.length < 2) return {pedidos:[], errores:["Texto vacío o formato incorrecto"], clientesOmitidos:[]};

  const sep = detectarSep(lineasRaw[0]);
  const lineas = lineasRaw.map(l => l.split(sep).map(c => c.replace(/\r/g,"").trim()));

  // Buscar fila de encabezados (la que tiene "Nombre Distribuidor" o "Distribuidor")
  let filaHeader = -1;
  let colCliente = -1;
  let colEstado = -1;
  for(let i = 0; i < Math.min(5, lineas.length); i++){
    const ci = lineas[i].findIndex(c => /distribuidor|nombre.*cliente|cliente/i.test(c));
    if(ci >= 0){ filaHeader = i; colCliente = ci; break; }
  }
  if(filaHeader === -1){ filaHeader = 0; colCliente = 4; }

  const headers = lineas[filaHeader];
  // Col estado: la que dice "Despachado" en encabezado, o col 1 por defecto
  colEstado = headers.findIndex(h => /despachado|estado/i.test(h));
  if(colEstado === -1) colEstado = 1;

  // Mapear cada columna del encabezado a un productoId
  const colsProd = []; // [{colIdx, prodId, prodNombre}]
  headers.forEach((h, ci) => {
    const prodId = CSV_HEADER_MAP[h] || CSV_HEADER_MAP[h.trim()];
    if(prodId){
      const prod = PRODUCTOS.find(p => p.id === prodId);
      if(prod) colsProd.push({colIdx: ci, prodId, prodNombre: prod.nombre});
    }
  });

  const pedidos = []; let id = 1;
  const errores = []; const clientesOmitidos = [];

  for(let i = filaHeader + 1; i < lineas.length; i++){
    const fila = lineas[i];
    if(fila.length < 3) continue;
    const nombreCliente = fila[colCliente]?.trim();
    if(!nombreCliente || nombreCliente === "") continue;

    // Filtrar despachados
    const estado = (fila[colEstado] || "").toLowerCase();
    if(estado === "despachado"){ clientesOmitidos.push(nombreCliente); continue; }

    let itemsCliente = 0;
    colsProd.forEach(({colIdx, prodId, prodNombre}) => {
      if(colIdx >= fila.length) return;
      const val = fila[colIdx]?.replace(",",".").replace(/[^\d.]/g,"");
      const cant = parseFloat(val);
      if(!isNaN(cant) && cant > 0){
        const prod = PRODUCTOS.find(p => p.id === prodId);
        if(!prod) return;
        const esLF = prod.marcaId === "LF_PANES" || prod.marcaId === "LF_DULCE";
        if(esLF){
          // Un ítem por unidad para el flujo de picking
          for(let u = 0; u < Math.round(cant); u++){
            pedidos.push({id:id++, cliente:nombreCliente, posicion:"", productoId:prodId,
              productoNombre:prodNombre, marcaId:prod.marcaId, cantidad:1, entregado:0});
          }
        } else {
          pedidos.push({id:id++, cliente:nombreCliente, posicion:"", productoId:prodId,
            productoNombre:prodNombre, marcaId:prod.marcaId, cantidad:cant, entregado:0});
        }
        itemsCliente++;
      }
    });
    if(itemsCliente === 0) errores.push(`${nombreCliente}: sin productos reconocidos`);
  }

  const colsNoMapeadas = headers.filter((h,i) => {
    if(!h || i < 5) return false;
    if(/mail|email|link|comentario|combo|@/i.test(h)) return false;
    return !CSV_HEADER_MAP[h] && !CSV_HEADER_MAP[h.trim()];
  });

  if(pedidos.length === 0) errores.push("No se encontraron pedidos. Verificá que pegaste desde la fila de encabezados.");
  return {pedidos, errores, clientesOmitidos, colsNoMapeadas};
};

// ── TOAST PICKING (cantidad editable, alerta exceso, faltante posible) ────────
function ToastPicking({data, onDone}){
  const [seg,setSeg]=useState(5);
  const [pausado,setPausado]=useState(false);
  const [extendido,setExtendido]=useState(false);
  const [cantReal,setCantReal]=useState(1);
  const restante = data.totalCliente - data.entregadoAntes;
  const esFaltante = cantReal === 0;
  const esExceso = (data.entregadoAntes + cantReal) > data.totalCliente;
  const exceso = esExceso ? (data.entregadoAntes + cantReal) - data.totalCliente : 0;

  const pausarTimer = pausado || extendido || esExceso;

  useEffect(()=>{
    if(pausarTimer) return;
    if(seg<=0){onDone(cantReal,"normal");return;}
    const t=setTimeout(()=>setSeg(s=>s-1),1000);
    return()=>clearTimeout(t);
  },[seg,pausarTimer,cantReal]); // onDone excluido — se recrea en cada render pero no debe reiniciar el timer

  const confirmar=()=>{
    if(esExceso) onDone(cantReal,"agregado_manual");
    else if(esFaltante) onDone(0,"faltante");
    else onDone(cantReal,"normal");
  };

  const colorBorde = esFaltante?"#ef4444":esExceso?"#f59e0b":"#22c55e";
  const bgPrincipal = esFaltante?"#3a0a0a":esExceso?"#3a2a00":"#0f3a1a";

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999,padding:16}}>
      <div onClick={e=>e.stopPropagation()} style={{background:bgPrincipal,border:`2px solid ${colorBorde}`,borderRadius:20,padding:20,textAlign:"center",width:"100%",maxWidth:340,animation:"popIn 0.2s ease"}}>
        <div style={{color:"#86efac",fontSize:11,fontWeight:700,letterSpacing:"0.1em",marginBottom:4}}>📍 LLEVAR A</div>
        <div style={{color:"#4ade80",fontSize:68,fontWeight:900,lineHeight:1}}>{data.posicion}</div>
        <div style={{color:"#f8fafc",fontSize:17,fontWeight:800,marginTop:4}}>{data.cliente}</div>
        <div style={{color:"#64748b",fontSize:12,marginTop:1}}>{data.variedad}</div>

        {/* Cantidad editable */}
        <div style={{background:"rgba(0,0,0,0.3)",borderRadius:10,padding:"10px 12px",marginTop:10}}>
          <div style={{color:"#94a3b8",fontSize:10,fontWeight:700,marginBottom:6}}>UNIDADES A ENTREGAR</div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:14}}>
            <div style={{width:42,height:42}}></div> {/* sin botón − en picking unitario */}
            <div style={{textAlign:"center",minWidth:64}}>
              <div style={{color:esFaltante?"#ef4444":esExceso?"#f59e0b":"#f8fafc",fontSize:44,fontWeight:900,lineHeight:1}}>{cantReal}</div>
              {esFaltante&&<div style={{color:"#ef4444",fontSize:10,fontWeight:700}}>FALTANTE</div>}
              {esExceso&&<div style={{color:"#f59e0b",fontSize:10,fontWeight:700}}>+{exceso} EXTRA</div>}
            </div>
<div style={{width:42,height:42}}></div> {/* sin botón + en picking unitario */}
          </div>
          <div style={{display:"flex",justifyContent:"space-around",marginTop:8,paddingTop:8,borderTop:"1px solid #ffffff11"}}>
            <div style={{textAlign:"center"}}>
              <div style={{color:"#22c55e",fontSize:16,fontWeight:900}}>{data.entregadoAntes}</div>
              <div style={{color:"#475569",fontSize:10}}>Ya tenía</div>
            </div>
            <div style={{color:"#334155",fontSize:14,alignSelf:"center"}}>+{cantReal}=</div>
            <div style={{textAlign:"center"}}>
              <div style={{color:esExceso?"#f59e0b":"#f8fafc",fontSize:16,fontWeight:900}}>{data.entregadoAntes+cantReal}</div>
              <div style={{color:"#475569",fontSize:10}}>de {data.totalCliente} ped.</div>
            </div>
          </div>
        </div>

        {/* Alerta exceso */}
        {esExceso&&(
          <div style={{background:"#3a2500",border:"1px solid #f59e0b",borderRadius:10,padding:"10px 12px",marginTop:10,textAlign:"left"}}>
            <div style={{color:"#f59e0b",fontSize:13,fontWeight:800,marginBottom:4}}>⚠️ Atención</div>
            <div style={{color:"#fcd34d",fontSize:12,lineHeight:1.5}}>
              Este cliente tiene <strong>{data.totalCliente} pedido/s</strong> pero estás sumando <strong>{data.entregadoAntes+cantReal}</strong>. Eso es <strong>{exceso} extra</strong>.
            </div>
            <div style={{color:"#94a3b8",fontSize:11,marginTop:6}}>¿Es correcto? Quedará como <strong style={{color:"#f59e0b"}}>producto agregado</strong>.</div>
          </div>
        )}

        {/* Controles */}
        {(!extendido&&!esExceso)?(
          <div style={{marginTop:10}}>
            {!esFaltante&&<>
              {/* Barra de progreso timer */}
              <div style={{background:"rgba(0,0,0,0.3)",borderRadius:99,height:4,marginBottom:4,overflow:"hidden"}}>
                <div style={{background:pausado?"#f59e0b":"#22c55e",height:"100%",width:`${(seg/5)*100}%`,transition:pausado?"none":"width 1s linear"}}/>
              </div>
              {/* Timer + pausa/play */}
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:8}}>
                <span style={{color:"#475569",fontSize:11}}>{pausado?"⏸ Pausado":"Cerrando en"} {seg}s</span>
                <button onClick={()=>setPausado(p=>!p)} style={{background:pausado?"#f59e0b22":"#1e293b",color:pausado?"#f59e0b":"#64748b",border:`1px solid ${pausado?"#f59e0b44":"#334155"}`,borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:700,cursor:"pointer"}}>
                  {pausado?"▶ Reanudar":"⏸ Pausar"}
                </button>
              </div>
            </>}
            <button onClick={()=>setExtendido(true)} style={{background:"transparent",color:"#64748b",border:"1px solid #334155",borderRadius:8,padding:"5px 12px",fontSize:12,cursor:"pointer"}}>
              🔍 Necesito buscar esta posición
            </button>
          </div>
        ):(
          <div style={{marginTop:10,display:"flex",flexDirection:"column",gap:8}}>
            <button onClick={confirmar} style={{
              background:esFaltante?"#7f1d1d":esExceso?"#92400e":"#16a34a",
              color:"#fff",border:"none",borderRadius:10,padding:"12px",fontSize:14,fontWeight:800,cursor:"pointer"
            }}>
              {esFaltante?"⚠️ Registrar como faltante":esExceso?`✓ Sí, confirmar ${data.entregadoAntes+cantReal} unidades`:"✓ Listo, entregué"}
            </button>
            {esExceso&&<button onClick={()=>setCantReal(restante)} style={{background:"transparent",color:"#64748b",border:"1px solid #334155",borderRadius:8,padding:"8px",fontSize:12,cursor:"pointer"}}>
              ← Corregir a {restante} (lo pedido)
            </button>}
          </div>
        )}
      </div>
    </div>
  );
}

// ── PANTALLA CARGAR PEDIDOS ───────────────────────────────────────────────────
function CargarPedidos({onCargar, onDemo, onVolver}){
  const [tab,setTab]=useState("manual");
  const [clientes,setClientes]=useState([{nombre:"",posiciones:[""],items:[{prodId:"",cantidad:""}]}]);
  const [csvText,setCsvText]=useState("");
  const [csvError,setCsvError]=useState("");
  const [csvPreview,setCsvPreview]=useState(null);

  const addCliente=()=>setClientes(p=>[...p,{nombre:"",posiciones:[""],items:[{prodId:"",cantidad:""}]}]);
  const delCliente=ci=>setClientes(p=>p.filter((_,i)=>i!==ci));
  const updNombre=(ci,v)=>setClientes(p=>p.map((c,i)=>i===ci?{...c,nombre:v}:c));
  const addPos=ci=>setClientes(p=>p.map((c,i)=>i===ci?{...c,posiciones:[...c.posiciones,""]}:c));
  const updPos=(ci,pi,v)=>setClientes(p=>p.map((c,i)=>i===ci?{...c,posiciones:c.posiciones.map((x,j)=>j===pi?v:x)}:c));
  const delPos=(ci,pi)=>setClientes(p=>p.map((c,i)=>i===ci?{...c,posiciones:c.posiciones.filter((_,j)=>j!==pi)}:c));
  const addItem=ci=>setClientes(p=>p.map((c,i)=>i===ci?{...c,items:[...c.items,{prodId:"",cantidad:""}]}:c));
  const delItem=(ci,ii)=>setClientes(p=>p.map((c,i)=>i===ci?{...c,items:c.items.filter((_,j)=>j!==ii)}:c));
  const updItem=(ci,ii,f,v)=>setClientes(p=>p.map((c,i)=>i===ci?{...c,items:c.items.map((it,j)=>j===ii?{...it,[f]:v}:it)}:c));

  const confirmarManual=()=>{
    const pedidos=[]; let id=1;
    clientes.forEach(c=>{
      if(!c.nombre.trim()) return;
      const poss=c.posiciones.filter(Boolean);
      if(poss.length===0) poss.push("");
      poss.forEach(pos=>{
        c.items.forEach(it=>{
          const prod=PRODUCTOS.find(p=>p.id===it.prodId);
          if(!prod||!it.cantidad) return;
          const cant=parseFloat(it.cantidad)||0;
          const esLF=prod.marcaId==="LF_PANES"||prod.marcaId==="LF_DULCE";
          if(esLF){
            for(let u=0;u<Math.round(cant);u++)
              pedidos.push({id:id++,cliente:c.nombre.trim(),posicion:pos,productoId:prod.id,productoNombre:prod.nombre,marcaId:prod.marcaId,cantidad:1,entregado:0});
          } else {
            pedidos.push({id:id++,cliente:c.nombre.trim(),posicion:pos,productoId:prod.id,productoNombre:prod.nombre,marcaId:prod.marcaId,cantidad:cant,entregado:0});
          }
        });
      });
    });
    if(pedidos.length===0){alert("Completá al menos un pedido válido");return;}
    onCargar(pedidos);
  };

  const procesarCSV=()=>{
    if(!csvText.trim()){setCsvError("Pegá el contenido del Sheet primero");return;}
    const {pedidos,errores,clientesOmitidos,colsNoMapeadas}=parsearCSV(csvText);
    if(errores.length>0&&pedidos.length===0){setCsvError(errores.join(". "));return;}
    setCsvError("");
    // resumen por cliente: suma de unidades (cantidad), no líneas
    const resumen={};
    pedidos.forEach(p=>{resumen[p.cliente]=(resumen[p.cliente]||0)+p.cantidad;});
    setCsvPreview({pedidos,resumen,errores,clientesOmitidos:clientesOmitidos||[],colsNoMapeadas:colsNoMapeadas||[]});
  };

  const prodsPorMarca=ORDEN_MARCAS.map(m=>({...m,prods:PRODUCTOS.filter(p=>p.marcaId===m.id)}));

  if(csvPreview){
    return (
      <div style={{minHeight:"100vh",overflowY:"auto"}}>
        <div style={{maxWidth:520,margin:"0 auto",padding:16}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20,paddingTop:16}}>
            <button onClick={()=>setCsvPreview(null)} style={{...S.card,color:"#94a3b8",padding:"7px 12px",fontSize:14,cursor:"pointer",border:"1px solid #334155"}}>← Volver</button>
            <h2 style={{margin:0,fontSize:18,fontWeight:900}}>✅ Vista previa CSV</h2>
          </div>
          <div style={{...S.card,padding:14,marginBottom:12}}>
            <div style={{color:"#22c55e",fontWeight:700,fontSize:16,marginBottom:8}}>
              {Object.values(csvPreview.resumen).reduce((s,n)=>s+n,0)} unidades · {Object.keys(csvPreview.resumen).length} clientes
            </div>
            {Object.entries(csvPreview.resumen).map(([c,n])=>(
              <div key={c} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid #334155",fontSize:13}}>
                <span style={{color:"#f8fafc"}}>{c}</span>
                <span style={{color:"#64748b"}}>{n} u.</span>
              </div>
            ))}
          </div>
          {csvPreview.errores.length>0&&<div style={{background:"#713f12",borderRadius:8,padding:10,marginBottom:12,color:"#fcd34d",fontSize:12}}>{csvPreview.errores.join(". ")}</div>}
          {csvPreview.clientesOmitidos?.length>0&&<div style={{background:"#14532d",borderRadius:8,padding:10,marginBottom:12,color:"#86efac",fontSize:12}}>✅ {csvPreview.clientesOmitidos.length} cliente/s "Despachado" omitidos: {csvPreview.clientesOmitidos.join(", ")}</div>}
          {csvPreview.colsNoMapeadas?.length>0&&<div style={{background:"#1e3a5f",borderRadius:8,padding:10,marginBottom:12,color:"#93c5fd",fontSize:11}}>ℹ️ Columnas sin mapear (ignoradas): {csvPreview.colsNoMapeadas.slice(0,5).join(", ")}{csvPreview.colsNoMapeadas.length>5?` y ${csvPreview.colsNoMapeadas.length-5} más...`:""}</div>}
          <button onClick={()=>onCargar(csvPreview.pedidos)} style={S.btnP}>✅ Confirmar e iniciar jornada</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{minHeight:"100vh",overflowY:"auto"}}>
      <div style={{maxWidth:520,margin:"0 auto",padding:16}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20,paddingTop:16}}>
          <button onClick={onVolver} style={{...S.card,color:"#94a3b8",padding:"7px 12px",fontSize:14,cursor:"pointer",border:"1px solid #334155"}}>← Volver</button>
          <div>
            <h2 style={{margin:0,fontSize:20,fontWeight:900}}>📋 Cargar Pedidos</h2>
            <p style={{margin:0,color:"#64748b",fontSize:12}}>Ingresá los pedidos del día</p>
          </div>
        </div>
        <div style={{display:"flex",background:"#1e293b",borderRadius:10,padding:3,marginBottom:16}}>
          {[["manual","✍️ Manual"],["csv","📄 Pegar CSV"]].map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)} style={{flex:1,background:tab===k?"#3b82f6":"transparent",color:tab===k?"#fff":"#64748b",border:"none",borderRadius:8,padding:"9px",fontSize:13,fontWeight:700,cursor:"pointer"}}>{l}</button>
          ))}
        </div>

        {tab==="manual"&&<>
          {clientes.map((c,ci)=>(
            <div key={ci} style={{...S.card,padding:14,marginBottom:10}}>
              <div style={{display:"flex",gap:8,marginBottom:10}}>
                <input placeholder="Nombre del cliente" value={c.nombre} onChange={e=>updNombre(ci,e.target.value)} style={{...S.input,flex:1}}/>
                <button onClick={()=>delCliente(ci)} style={{background:"#7f1d1d",color:"#fca5a5",border:"none",borderRadius:7,padding:"8px 10px",cursor:"pointer"}}>✕</button>
              </div>
              <div style={{marginBottom:10}}>
                <div style={{color:"#64748b",fontSize:11,fontWeight:700,marginBottom:6}}>POSICIONES</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                  {c.posiciones.map((pos,pi)=>(
                    <div key={pi} style={{display:"flex",gap:3}}>
                      <select value={pos} onChange={e=>updPos(ci,pi,e.target.value)} style={{background:"#0f172a",border:"1px solid #334155",color:"#f8fafc",borderRadius:7,padding:"6px 8px",fontSize:13,fontWeight:700}}>
                        <option value="">— Pos —</option>
                        {TODAS_POS.map(p=><option key={p} value={p}>{p}</option>)}
                      </select>
                      {c.posiciones.length>1&&<button onClick={()=>delPos(ci,pi)} style={{background:"#7f1d1d",color:"#fca5a5",border:"none",borderRadius:5,padding:"4px 7px",fontSize:11,cursor:"pointer"}}>✕</button>}
                    </div>
                  ))}
                  <button onClick={()=>addPos(ci)} style={{background:"#1e3a5f",color:"#3b82f6",border:"1px dashed #3b82f6",borderRadius:7,padding:"5px 10px",fontSize:11,cursor:"pointer"}}>+ Pos</button>
                </div>
              </div>
              <div style={{color:"#64748b",fontSize:11,fontWeight:700,marginBottom:6}}>PRODUCTOS</div>
              {c.items.map((it,ii)=>(
                <div key={ii} style={{display:"flex",gap:6,marginBottom:6}}>
                  <select value={it.prodId} onChange={e=>updItem(ci,ii,"prodId",e.target.value)} style={{flex:1,background:"#0f172a",border:"1px solid #334155",color:"#f8fafc",borderRadius:7,padding:"6px 8px",fontSize:12}}>
                    <option value="">— Producto —</option>
                    {prodsPorMarca.map(m=>(
                      <optgroup key={m.id} label={m.label}>
                        {m.prods.map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}
                      </optgroup>
                    ))}
                  </select>
                  <input type="number" min="1" step="1" placeholder="Cant" value={it.cantidad} onChange={e=>updItem(ci,ii,"cantidad",e.target.value)} style={{width:62,background:"#0f172a",border:"1px solid #334155",color:"#f8fafc",borderRadius:7,padding:"6px 8px",fontSize:13}}/>
                  {c.items.length>1&&<button onClick={()=>delItem(ci,ii)} style={{background:"#7f1d1d",color:"#fca5a5",border:"none",borderRadius:5,padding:"4px 7px",fontSize:11,cursor:"pointer"}}>✕</button>}
                </div>
              ))}
              <button onClick={()=>addItem(ci)} style={{background:"transparent",color:"#64748b",border:"1px dashed #334155",borderRadius:7,padding:"5px 12px",fontSize:12,cursor:"pointer",width:"100%"}}>+ Producto</button>
            </div>
          ))}
          <button onClick={addCliente} style={{...S.btnS,color:"#3b82f6",border:"1px dashed #3b82f6",marginBottom:10}}>+ Agregar Cliente</button>
          <button onClick={confirmarManual} style={S.btnP}>✅ Iniciar jornada</button>
        </>}

        {tab==="csv"&&(
          <div>
            <div style={{...S.card,padding:14,marginBottom:12,fontSize:13,color:"#94a3b8",lineHeight:1.7}}>
              <strong style={{color:"#f8fafc"}}>Cómo importar desde Google Sheets:</strong><br/>
              1. Abrí el Sheet de pedidos<br/>
              2. Seleccioná todas las filas (incluyendo la fila de encabezados)<br/>
              3. <strong style={{color:"#f8fafc"}}>Ctrl+C</strong> (o Cmd+C en Mac)<br/>
              4. Hacé clic en el área de abajo y <strong style={{color:"#f8fafc"}}>Ctrl+V</strong>
            </div>
            <textarea
              placeholder="Pegá acá el contenido del Sheet..."
              value={csvText}
              onChange={e=>{setCsvText(e.target.value);setCsvError("");}}
              style={{width:"100%",height:180,background:"#1e293b",border:"1px solid #334155",color:"#f8fafc",borderRadius:10,padding:12,fontSize:12,fontFamily:"monospace",resize:"vertical",display:"block"}}
            />
            {csvError&&<div style={{color:"#ef4444",fontSize:12,marginTop:6,padding:"8px 10px",background:"#7f1d1d",borderRadius:7}}>{csvError}</div>}
            <button onClick={procesarCSV} style={{...S.btnP,marginTop:10}}>🔍 Procesar CSV</button>
          </div>
        )}
        <button onClick={onDemo} style={{...S.btnS,marginTop:10}}>🧪 Usar datos de demo</button>
      </div>
    </div>
  );
}

// ── ASIGNACIÓN POSICIONES ─────────────────────────────────────────────────────
function AsignacionPosiciones({pedidos, setPedidos, onConfirmar, onVolver}){
  const clientesUnicos=[...new Set(pedidos.map(p=>p.cliente))];
  const [asig,setAsig]=useState(()=>{
    const m={};
    clientesUnicos.forEach(c=>{
      const poss=[...new Set(pedidos.filter(p=>p.cliente===c).map(p=>p.posicion).filter(Boolean))];
      m[c]=poss.length?poss:[""];
    });
    return m;
  });
  const addPos=c=>setAsig(p=>({...p,[c]:[...p[c],""]}));
  const updPos=(c,i,v)=>setAsig(p=>({...p,[c]:p[c].map((x,j)=>j===i?v:x)}));
  const delPos=(c,i)=>setAsig(p=>({...p,[c]:p[c].filter((_,j)=>j!==i)}));
  const usoPorPos={};
  Object.values(asig).flat().filter(Boolean).forEach(p=>{usoPorPos[p]=(usoPorPos[p]||0)+1;});

  const guardar=()=>{
    const expandidos=[];
    const clientesUnicos2=[...new Set(pedidos.map(p=>p.cliente))];
    clientesUnicos2.forEach(cliente=>{
      const poss=(asig[cliente]||[]).filter(Boolean);
      const itemsCliente=pedidos.filter(p=>p.cliente===cliente);
      if(poss.length===0){
        itemsCliente.forEach(p=>expandidos.push({...p,posicion:""}));
        return;
      }
      if(poss.length===1){
        itemsCliente.forEach(p=>expandidos.push({...p,posicion:poss[0]}));
        return;
      }
      // Múltiples posiciones (cliente con varios palets):
      // La Francia: cada ítem (=1 unidad) se distribuye en round-robin entre posiciones
      // Otras marcas: si hay 1 ítem con cantidad N, distribuir la cantidad entre posiciones
      const prodIds=[...new Set(itemsCliente.map(p=>p.productoId))];
      let contadorGlobal=0; // para round-robin entre todos los productos
      prodIds.forEach(prodId=>{
        const itemsProd=itemsCliente.filter(p=>p.productoId===prodId);
        const marcaId=itemsProd[0]?.marcaId;
        const esLaFrancia=marcaId==="LF_PANES"||marcaId==="LF_DULCE";
        if(esLaFrancia){
          // Cada ítem (1 unidad) va a una posición en round-robin
          itemsProd.forEach((item)=>{
            const pos=poss[contadorGlobal%poss.length];
            contadorGlobal++;
            expandidos.push({...item,posicion:pos});
          });
        } else {
          // Para cada ítem, si tiene cantidad grande, dividirla entre posiciones
          itemsProd.forEach((item)=>{
            const cant=item.cantidad||1;
            if(cant<=poss.length){
              // Poca cantidad: todo a la primera posición del round-robin
              expandidos.push({...item,posicion:poss[contadorGlobal%poss.length]});
              contadorGlobal++;
            } else {
              // Cantidad > posiciones: distribuir lo más parejo posible
              const base=Math.floor(cant/poss.length);
              const resto=cant%poss.length;
              poss.forEach((pos,pi)=>{
                const cantPos=base+(pi<resto?1:0);
                if(cantPos>0){
                  expandidos.push({...item,id:item.id+"-"+pi,posicion:pos,cantidad:cantPos,entregado:0});
                }
              });
            }
          });
        }
      });
    });
    onConfirmar(expandidos);
  };

  return (
    <div style={{minHeight:"100vh",overflowY:"auto"}}>
      <div style={{maxWidth:520,margin:"0 auto",padding:16}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,paddingTop:16}}>
          <button onClick={onVolver} style={{...S.card,color:"#94a3b8",padding:"7px 12px",fontSize:14,cursor:"pointer",border:"1px solid #334155"}}>← Volver</button>
          <div>
            <h2 style={{margin:0,fontSize:20,fontWeight:900}}>🗺️ Posiciones</h2>
            <p style={{margin:0,color:"#64748b",fontSize:12}}>{clientesUnicos.length} clientes</p>
          </div>
        </div>
        {/* Mapa mini */}
        <div style={{...S.card,padding:10,marginBottom:14}}>
          <div style={{fontSize:10,color:"#475569",fontWeight:700,marginBottom:6}}>DEPÓSITO — 2 hileras × 15 palets · Zona 1: 1-5 · Zona 2: 6-10 · Zona 3: 11-15</div>
          <div style={{display:"flex",gap:4}}>
            {["A","B"].map((lado,li)=>(
              <React.Fragment key={lado}>
                {li===1&&<div style={{width:16,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{writingMode:"vertical-rl",fontSize:8,color:"#334155",fontWeight:700,letterSpacing:2}}>PASILLO</div></div>}
                <div style={{display:"flex",flexDirection:"column",gap:2,flex:1}}>
                  {Array.from({length:15},(_,i)=>`${lado}${i+1}`).map(pos=>{
                    const uso=usoPorPos[pos]||0;
                    const zona=zonaDePos(pos);
                    const zonaBg=zona===1?"#1a3a1a":zona===2?"#1a2a3a":"#2a1a3a";
                    return <div key={pos} style={{background:uso===0?zonaBg:uso===1?"#1e3a5f":"#1e4080",border:`1px solid ${uso===0?"#334155":uso===1?"#3b82f6":"#60a5fa"}`,borderRadius:3,padding:"2px 4px",fontSize:9,fontWeight:700,color:uso===0?"#475569":"#93c5fd",textAlign:"center"}}>{pos}{uso>1?` ×${uso}`:""}</div>;
                  })}
                </div>
              </React.Fragment>
            ))}
          </div>
        </div>
        {clientesUnicos.map(cliente=>{
          const prods=[...new Set(pedidos.filter(p=>p.cliente===cliente).map(p=>p.productoId))].length;
          const poss=asig[cliente]||[""];
          return (
            <div key={cliente} style={{...S.card,padding:12,marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div><div style={{fontWeight:700,fontSize:14}}>{cliente}</div><div style={{color:"#64748b",fontSize:11}}>{prods} variedades</div></div>
                <button onClick={()=>addPos(cliente)} style={{background:"#1e3a5f",color:"#3b82f6",border:"1px dashed #3b82f6",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer"}}>+ Posición</button>
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                {poss.map((pos,pi)=>(
                  <div key={pi} style={{display:"flex",gap:3,alignItems:"center"}}>
                    <select value={pos} onChange={e=>updPos(cliente,pi,e.target.value)} style={{background:"#0f172a",color:"#f8fafc",border:"1px solid #475569",borderRadius:6,padding:"6px 8px",fontSize:14,fontWeight:700,cursor:"pointer"}}>
                      <option value="">— Pos —</option>
                      {TODAS_POS.map(p=><option key={p} value={p}>{p}</option>)}
                    </select>
                    {poss.length>1&&<button onClick={()=>delPos(cliente,pi)} style={{background:"#7f1d1d",color:"#fca5a5",border:"none",borderRadius:5,padding:"4px 7px",fontSize:11,cursor:"pointer"}}>✕</button>}
                  </div>
                ))}
              </div>
            </div>
          );
        })}
        <div style={{height:12}}/>
        <button onClick={guardar} style={{...S.btnP,background:"#e85d04",marginBottom:16}}>✅ Confirmar y comenzar</button>
      </div>
    </div>
  );
}

// ── PALET NUEVO ───────────────────────────────────────────────────────────────
function PaletNuevo({marcaId, pedidos, onCerrar}){
  const [seleccion,setSeleccion]=useState([]);
  const [resultado,setResultado]=useState(null);

  const prodsDisponibles=PRODUCTOS.filter(p=>p.marcaId===marcaId);

  const toggleProd=id=>setSeleccion(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);

  const calcularZona=()=>{
    if(seleccion.length===0) return;
    // Para cada variedad seleccionada, ver qué posiciones todavía necesitan esa variedad
    const posNecesitan=new Set();
    pedidos.forEach(p=>{
      if(seleccion.includes(p.productoId)&&estadoItem(p)!=="completo") posNecesitan.add(p.posicion);
    });

    if(posNecesitan.size===0){setResultado({zona:null,msg:"Todas las posiciones para estas variedades ya están cubiertas.",posiciones:[]});return;}

    // Contar cuántas posiciones necesitan por zona
    const contZona={1:0,2:0,3:0};
    posNecesitan.forEach(pos=>{if(pos)contZona[zonaDePos(pos)]++;});

    // Recomendar la zona con más demanda que aún no esté completa
    // Verificar zonas completas (todos los ítems de esa zona entregados)
    const zonaCompleta=z=>{
      const posDeLaZona=TODAS_POS.filter(p=>zonaDePos(p)===z);
      return posDeLaZona.every(pos=>{
        const items=pedidos.filter(p=>p.posicion===pos&&seleccion.includes(p.productoId));
        return items.length===0||items.every(p=>estadoItem(p)==="completo");
      });
    };

    let zonaRec=null;
    // Preferir zona 1 si tiene demanda, sino 2, sino 3
    for(let z=1;z<=3;z++){
      if(contZona[z]>0&&!zonaCompleta(z)){zonaRec=z;break;}
    }
    if(!zonaRec) zonaRec=3;

    const posDeZona=[...posNecesitan].filter(p=>p&&zonaDePos(p)===zonaRec);
    setResultado({zona:zonaRec,msg:`Recomendamos ubicar este palet en la Zona ${zonaRec}`,posiciones:posDeZona,contZona});
  };

  const zonaColor={1:"#22c55e",2:"#3b82f6",3:"#b5179e"};
  const zonaLabel={1:"Zona 1 (A1-A5 / B1-B5)",2:"Zona 2 (A6-A10 / B6-B10)",3:"Zona 3 (A11-A15 / B11-B15)"};

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:9998}}>
      <div style={{background:"#1e293b",borderRadius:"20px 20px 0 0",padding:20,width:"100%",maxWidth:480,maxHeight:"85vh",overflowY:"auto",animation:"fadeIn 0.25s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div>
            <h3 style={{margin:0,fontSize:18,fontWeight:900}}>🪵 Palet Nuevo</h3>
            <p style={{margin:0,color:"#64748b",fontSize:12}}>¿Qué variedades tiene este palet?</p>
          </div>
          <button onClick={onCerrar} style={{background:"#0f172a",color:"#64748b",border:"1px solid #334155",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:14}}>✕</button>
        </div>

        {!resultado?(
          <>
            <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:16}}>
              {prodsDisponibles.map(p=>{
                const sel=seleccion.includes(p.id);
                const nc=NOMBRE_CORTO[p.id]||p.nombre.split(" ").slice(2,4).join(" ");
                return (
                  <button key={p.id} onClick={()=>toggleProd(p.id)} style={{
                    background:sel?"#e85d04":"#0f172a",
                    color:sel?"#fff":"#94a3b8",
                    border:`2px solid ${sel?"#e85d04":"#334155"}`,
                    borderRadius:8,padding:"8px 14px",fontSize:13,fontWeight:700,cursor:"pointer",
                    transition:"all 0.15s",
                  }}>{nc}</button>
                );
              })}
            </div>
            {seleccion.length>0&&(
              <button onClick={calcularZona} style={{...S.btnP,background:"#e85d04"}}>
                📍 Ver dónde ubicar el palet ({seleccion.length} variedad/es)
              </button>
            )}
          </>
        ):(
          <div style={{animation:"popIn 0.2s ease"}}>
            {resultado.zona?(
              <>
                <div style={{background:"#0f172a",borderRadius:12,padding:20,textAlign:"center",marginBottom:14,border:`2px solid ${zonaColor[resultado.zona]}`}}>
                  <div style={{color:zonaColor[resultado.zona],fontSize:13,fontWeight:700,marginBottom:4}}>UBICAR EN</div>
                  <div style={{color:zonaColor[resultado.zona],fontSize:48,fontWeight:900,lineHeight:1}}>ZONA {resultado.zona}</div>
                  <div style={{color:"#94a3b8",fontSize:13,marginTop:6}}>{zonaLabel[resultado.zona]}</div>
                </div>
                {resultado.posiciones.length>0&&(
                  <div style={{...S.card,padding:12,marginBottom:14}}>
                    <div style={{color:"#64748b",fontSize:11,fontWeight:700,marginBottom:6}}>POSICIONES QUE NECESITAN ESTAS VARIEDADES:</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                      {resultado.posiciones.map(pos=>(
                        <span key={pos} style={{background:zonaColor[resultado.zona]+"33",color:zonaColor[resultado.zona],borderRadius:6,padding:"3px 10px",fontSize:13,fontWeight:700}}>{pos}</span>
                      ))}
                    </div>
                  </div>
                )}
                {resultado.contZona&&(
                  <div style={{display:"flex",gap:8,marginBottom:14}}>
                    {[1,2,3].map(z=>(
                      <div key={z} style={{flex:1,...S.card,padding:10,textAlign:"center",border:`1px solid ${z===resultado.zona?zonaColor[z]:"#334155"}`}}>
                        <div style={{color:zonaColor[z],fontWeight:900,fontSize:18}}>{resultado.contZona[z]}</div>
                        <div style={{color:"#64748b",fontSize:10}}>Zona {z}</div>
                      </div>
                    ))}
                  </div>
                )}
              </>
            ):(
              <div style={{...S.card,padding:16,textAlign:"center",marginBottom:14}}>
                <div style={{fontSize:32}}>✅</div>
                <div style={{color:"#22c55e",fontWeight:700,marginTop:8}}>{resultado.msg}</div>
              </div>
            )}
            <button onClick={()=>setResultado(null)} style={{...S.btnS,marginBottom:8}}>← Cambiar variedades</button>
            <button onClick={onCerrar} style={S.btnP}>Listo</button>
          </div>
        )}
      </div>
    </div>
  );
}
