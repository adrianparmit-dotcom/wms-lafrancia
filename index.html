function PickingLaFrancia({marcaConfig, pedidos, setPedidos, onMarcaCompleta, addModif, claimItem, confirmarItemAtomico, operario}){
  const [toast,setToast]=useState(null);
  const [ultimaPos,setUltimaPos]=useState(null);
  const [mostrarPalet,setMostrarPalet]=useState(false);
  const [historial,setHistorial]=useState([]); // [{pedidoId, estadoAnterior, info}]
  const [mostrarFinalizar,setMostrarFinalizar]=useState(false);
  const [mostrarRevision,setMostrarRevision]=useState(false);
  const [toastExtra,setToastExtra]=useState(null); // {prod} para agregar unidades extra
  const [flashDeshacer,setFlashDeshacer]=useState(false); // feedback visual al deshacer
  const col=marcaConfig.color;

    const todosProds = PRODUCTOS.filter(p=>p.marcaId===marcaConfig.id&&!PRODS_OCULTOS.has(p.id));

  const prodsPend=[...new Set(
    pedidos.filter(p=>p.marcaId===marcaConfig.id&&estadoItem(p)!=="completo").map(p=>p.productoId)
  )].map(id=>{
    const prod=PRODUCTOS.find(x=>x.id===id);
    const items=pedidos.filter(p=>p.productoId===id&&estadoItem(p)!=="completo");
    return {...prod,items,pendientes:items.length};
  });

    const estadoProd=(prodId)=>{
    const items=pedidos.filter(p=>p.productoId===prodId&&p.marcaId===marcaConfig.id);
    if(items.length===0) return "sin_pedido";
    if(items.every(p=>estadoItem(p)==="completo")) return "completo";
    if(items.some(p=>p.entregado>0)) return "parcial";
    return "pendiente";
  };

  // El operario toca una variedad → intenta tomar el ítem más urgente vía lock Firebase
  const handleTengoEste=prod=>{
    // Ordenar candidatos: parciales primero, luego por cercanía
    const candidatos=[...prod.items].sort((a,b)=>{
      const ea=estadoItem(a),eb=estadoItem(b);
      if(ea==="parcial"&&eb!=="parcial") return -1;
      if(eb==="parcial"&&ea!=="parcial") return 1;
      return POS_ORD.indexOf(a.posicion)-POS_ORD.indexOf(b.posicion);
    });

    const intentar=(idx)=>{
      if(idx>=candidatos.length) return; // no quedan candidatos
      const dest=candidatos[idx];
      const entregadosAntesCliente=pedidos.filter(p=>
        p.productoId===prod.id&&p.cliente===dest.cliente&&p.posicion===dest.posicion&&estadoItem(p)==="completo"
      ).length;
      const totalClienteVariedad=pedidos.filter(p=>
        p.productoId===prod.id&&p.cliente===dest.cliente&&p.posicion===dest.posicion
      ).length;

      // Intentar tomar el lock — si otro llegó primero, pasa al siguiente candidato
      claimItem(dest.id, operario||"?", ()=>{
        setToast({
          pedidoId:dest.id, productoId:prod.id, posicion:dest.posicion,
          cliente:dest.cliente, variedad:NOMBRE_CORTO[prod.id]||prod.nombre,
          entregadoAntes:entregadosAntesCliente, totalCliente:totalClienteVariedad,
        });
      }, ()=>intentar(idx+1)); // onFail: intentar siguiente
    };

    intentar(0);
  };

  const handleToastDone=(cantReal, tipo)=>{
    const {pedidoId,posicion,cliente,variedad,productoId}=toast;
    const esFaltante=tipo==="faltante";
    const esAgregado=tipo==="agregado_manual";
    const pedidoAnterior=pedidos.find(p=>p.id===pedidoId);
    const extraData={esFaltante,esAgregado,tsConfirmado:Date.now(),operarioConfirmo:operario||"?"};
    // En picking La Francia cada ítem tiene cantidad=1 — siempre confirmar con 1
    // El exceso/agregado se registra como modif pero el ítem queda entregado=1
    const cantParaConfirmar = (tipo==="normal"||tipo==="faltante") ? (esFaltante?0:1) : 1;
    confirmarItemAtomico(pedidoId, cantParaConfirmar, extraData,
      (cantFinal)=>{
        // Push al historial solo cuando la confirmación tiene éxito
        setHistorial(prev=>[...prev,{pedidoId, estadoAnterior:{...pedidoAnterior}, info:{posicion,cliente,variedad,cantReal:cantFinal,esFaltante,esAgregado}}]);
        if(tipo!=="normal"){
          addModif({tipo:"picking",pedidoId,productoId,posicion,cliente,variedad,
            cantOriginal:1,cantReal:cantFinal,esFaltante,esAgregado,
            tipoMod:esAgregado?"agregado_manual":"faltante"});
        }
        setUltimaPos({posicion,cliente,variedad,cantReal:cantFinal,esFaltante,esAgregado});
        setToast(null);
      },
      ()=>{
        setToast(null);
      }
    );
  };

  const handleDeshacer=()=>{
    if(!historial.length) return;
    const ultimo=historial[historial.length-1];
    setPedidos(prev=>prev.map(p=>p.id===ultimo.pedidoId?ultimo.estadoAnterior:p));
    setHistorial(prev=>prev.slice(0,-1));
        const info=ultimo.info;
    setUltimaPos(historial.length>1?historial[historial.length-2].info:null);
    setFlashDeshacer({texto:`↩ Deshecho: ${info.variedad} — ${info.cliente}`,ts:Date.now()});
    setTimeout(()=>setFlashDeshacer(null),2500);
  };

  const totalPend=prodsPend.reduce((s,p)=>s+p.pendientes,0);

  if(mostrarFinalizar) return <FinalizarMarca marcaConfig={marcaConfig} pedidos={pedidos} addModif={addModif} onVolver={()=>setMostrarFinalizar(false)} onConfirmar={()=>{setMostrarFinalizar(false);onMarcaCompleta();}}/>;

  return (
    <div style={{paddingBottom:20}}>
      {toast&&<ToastPicking data={toast} onDone={handleToastDone}/>}
      {toastExtra&&<ToastExtra
        prod={toastExtra.prod}
        pedidos={pedidos}
        marcaId={marcaConfig.id}
        col={col}
        onConfirmar={(cliente,posicion,cant)=>{
                    for(let i=0;i<cant;i++){
            addModif({tipo:"picking",pedidoId:"extra_"+Date.now()+"_"+i,
              productoId:toastExtra.prod.id,posicion,cliente,
              variedad:NOMBRE_CORTO[toastExtra.prod.id]||toastExtra.prod.nombre,
              cantOriginal:0,cantReal:1,esFaltante:false,esAgregado:true,tipoMod:"agregado_manual"});
          }
          setUltimaPos({posicion,cliente,variedad:NOMBRE_CORTO[toastExtra.prod.id]||toastExtra.prod.nombre,cantReal:cant,esFaltante:false,esAgregado:true});
          setToastExtra(null);
        }}
        onCerrar={()=>setToastExtra(null)}
      />}
      {mostrarPalet&&<PaletNuevo marcaId={marcaConfig.id} pedidos={pedidos} onCerrar={()=>setMostrarPalet(false)}/>}

      {/* Flash deshacer — aparece 2.5s después de tocar deshacer */}
      {flashDeshacer&&(
        <div style={{background:"#3a2500",borderBottom:"2px solid #f59e0b",padding:"8px 16px",display:"flex",alignItems:"center",gap:8,animation:"fadeIn 0.2s ease"}}>
          <span style={{color:"#fcd34d",fontWeight:900,fontSize:13}}>↩ {flashDeshacer.texto}</span>
          {historial.length>0&&<span style={{color:"#92400e",fontSize:11,marginLeft:"auto"}}>{historial.length} acción{historial.length>1?"es":""} para deshacer</span>}
        </div>
      )}

      {/* Última posición entregada + deshacer */}
      {!flashDeshacer&&ultimaPos&&(
        <div style={{background:ultimaPos.esFaltante?"#3a0a0a":"#0f3a1a",borderBottom:`1px solid ${ultimaPos.esFaltante?"#ef444433":"#22c55e33"}`,padding:"8px 16px",display:"flex",alignItems:"center",gap:8,animation:"fadeIn 0.3s ease"}}>
          <span style={{fontSize:11,color:"#475569"}}>Última:</span>
          <span style={{color:ultimaPos.esFaltante?"#f87171":"#4ade80",fontWeight:700,fontSize:13}}>{ultimaPos.posicion}</span>
          <span style={{color:"#64748b",fontSize:11}}>— {ultimaPos.cliente}</span>
          <span style={{color:"#475569",fontSize:11,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ultimaPos.variedad}</span>
          {ultimaPos.esFaltante&&<span style={{color:"#ef4444",fontSize:11,fontWeight:700}}>⚠️</span>}
          {historial.length>0&&(
            <button onClick={handleDeshacer} style={{marginLeft:"auto",background:"#1e293b",color:"#f59e0b",border:"1px solid #f59e0b44",borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>
              ↩ Deshacer {historial.length>1?`(${historial.length})`:""}
            </button>
          )}
        </div>
      )}

      {/* Botón palet nuevo */}
      <div style={{padding:"10px 16px 0",display:"flex",gap:8}}>
        <button onClick={()=>setMostrarPalet(true)} style={{
          flex:1,background:"#1e293b",border:"1px solid #e85d04",color:"#e85d04",
          borderRadius:9,padding:"10px",fontSize:13,fontWeight:700,cursor:"pointer",
          display:"flex",alignItems:"center",justifyContent:"center",gap:6,
        }}>
          🪵 Palet nuevo — ¿dónde ubicarlo?
        </button>
      </div>

      {/* Instrucción + botón finalizar */}
      <div style={{padding:"10px 16px 4px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{color:"#64748b",fontSize:12}}>Tocá la variedad ({totalPend} pend.)</div>
        <button onClick={()=>setMostrarFinalizar(true)} style={{background:"#1e293b",color:col,border:"1px solid #334155",borderRadius:8,padding:"5px 11px",fontSize:12,fontWeight:700,cursor:"pointer"}}>Finalizar →</button>
      </div>

      {/* Grilla de variedades — siempre visible */}
      <div style={{padding:"0 16px",display:"flex",flexWrap:"wrap",gap:8}}>
        {prodsPend.length===0&&(
          <div style={{width:"100%",textAlign:"center",padding:"16px 0 8px"}}>
            <div style={{fontSize:32}}>🎉</div>
            <div style={{color:"#22c55e",fontWeight:700,fontSize:15,marginTop:4}}>¡{marcaConfig.label} completo!</div>
            <button onClick={()=>setMostrarFinalizar(true)} style={{marginTop:12,background:col,color:"#fff",border:"none",borderRadius:10,padding:"10px 24px",fontSize:14,fontWeight:900,cursor:"pointer"}}>Finalizar {marcaConfig.label} →</button>
          </div>
        )}
        {todosProds.map(prod=>{
          const nc=NOMBRE_CORTO[prod.id]||prod.nombre.split(" ").slice(2,4).join(" ");
          const est=estadoProd(prod.id);
          const pend=prodsPend.find(p=>p.id===prod.id);
          const activo=est==="pendiente"||est==="parcial";
          const bgColor=est==="completo"?"#14532d":est==="sin_pedido"?"#0f172a":est==="parcial"?"#3a2500":"#1e293b";
          const borderColor=est==="completo"?"#22c55e":est==="sin_pedido"?"#1e293b":est==="parcial"?"#f59e0b":col+"66";
          const textColor=est==="completo"?"#86efac":est==="sin_pedido"?"#334155":"#f8fafc";
          const subColor=est==="completo"?"#22c55e":est==="sin_pedido"?"#1e293b":est==="parcial"?"#f59e0b":col;
          const subText=est==="completo"?"✓ listo":est==="sin_pedido"?"sin pedido":est==="parcial"?`${pend?.pendientes||0} pend.`:`${pend?.pendientes||0} pend.`;
          return (
            <button key={prod.id}
              onClick={()=>{
                if(activo&&pend) handleTengoEste(pend);
                else if(est==="completo") setToastExtra({prod});
              }}
              disabled={est==="sin_pedido"}
              style={{
                flex:"1 1 calc(50% - 4px)",minWidth:130,
                background:bgColor,border:`2px solid ${borderColor}`,
                borderRadius:10,padding:"12px 10px",textAlign:"center",
                cursor:est==="sin_pedido"?"default":"pointer",
                transition:"all 0.15s",opacity:est==="sin_pedido"?0.5:1,
              }}
              onMouseEnter={e=>{if(activo&&pend){e.currentTarget.style.background="#273347";e.currentTarget.style.borderColor=col;}}}
              onMouseLeave={e=>{if(activo&&pend){e.currentTarget.style.background=bgColor;e.currentTarget.style.borderColor=borderColor;}}}
            >
              <div style={{color:textColor,fontSize:14,fontWeight:800}}>{nc}</div>
              <div style={{color:subColor,fontSize:11,fontWeight:700,marginTop:3}}>{subText}</div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ── DISTRIBUCIÓN OTRAS MARCAS ─────────────────────────────────────────────────
function Distribucion({marcaConfig, pedidos, setPedidos, onMarcaCompleta, addModif}){
  const [vista,setVista]=useState("posiciones");
  const [posActiva,setPosActiva]=useState(null);
  const [varIdx,setVarIdx]=useState(0);
  const [cantEdit,setCantEdit]=useState(null);
  const [mostrarFinalizar,setMostrarFinalizar]=useState(false);
  const [mostrarRevision,setMostrarRevision]=useState(false);
  const col=marcaConfig.color;

  const itemsPend=pedidos.filter(p=>p.marcaId===marcaConfig.id&&estadoItem(p)!=="completo");
  const posicionesPend=[...new Set(itemsPend.map(p=>p.posicion).filter(Boolean))].sort((a,b)=>POS_ORD.indexOf(a)-POS_ORD.indexOf(b));

  const variedadesDePos=(pos)=>{
    // Excluir ítems ya confirmados (completos O ya visitados en esta ronda)
    const its=pedidos.filter(p=>p.marcaId===marcaConfig.id&&p.posicion===pos&&estadoItem(p)!=="completo"&&!p._visitado);
    return [...new Set(its.map(p=>p.productoId))].map(prodId=>{
      const prod=PRODUCTOS.find(x=>x.id===prodId);
      const items=its.filter(p=>p.productoId===prodId);
      const total=items.reduce((s,p)=>s+p.cantidad,0);
      const entregado=items.reduce((s,p)=>s+p.entregado,0);
      return {prodId,prod,items,total,pendiente:total-entregado,cliente:items[0]?.cliente||""};
    }).filter(v=>v.pendiente>0);
  };

  const entrarPos=(pos)=>{
    // Limpiar flag _visitado de ítems de esta posición al entrar de nuevo
    setPedidos(prev=>prev.map(p=>p.posicion===pos&&p.marcaId===marcaConfig.id?{...p,_visitado:false}:p));
    setPosActiva(pos);setVarIdx(0);setCantEdit(null);setVista("variedad");
  };
  const volverAPosiciones=()=>{setVista("posiciones");setPosActiva(null);setVarIdx(0);setCantEdit(null);};

  const confirmarVariedad=()=>{
    const vars=variedadesDePos(posActiva);
    if(!vars.length){siguientePosicion();return;}
    const vActiva=vars[Math.min(varIdx,vars.length-1)];
    if(!vActiva) return;
    const cantPend=vActiva.pendiente;
    const cantReal=cantEdit!==null?cantEdit:cantPend;
    const esFaltante=cantReal!==cantPend&&cantReal<cantPend;
    const esAgregado=cantReal>cantPend;
        if(esFaltante||esAgregado){
      vActiva.items.forEach(p=>{
        const disp=p.cantidad-p.entregado;
        if(disp>0) addModif({tipo:"distribucion",pedidoId:p.id,productoId:p.productoId,posicion:posActiva,cliente:p.cliente,variedad:vActiva.prod?.nombre||"",cantOriginal:p.cantidad,cantReal:cantReal,esFaltante,esAgregado,tipoMod:esAgregado?"agregado_manual":"faltante"});
      });
    }
        setPedidos(prev=>prev.map(p=>{
      if(p.productoId!==vActiva.prodId||p.posicion!==posActiva||estadoItem(p)==="completo") return p;
      const entregadoFinal=esAgregado?p.cantidad:Math.min(p.entregado+cantReal, p.cantidad);
      return {...p,entregado:entregadoFinal,esFaltante,esAgregado,_visitado:true};
    }));
    setCantEdit(null);
    setTimeout(()=>{
      const varsPost=variedadesDePos(posActiva);
      if(varIdx+1<=varsPost.length-1) setVarIdx(varIdx+1);
      else siguientePosicion();
    },50);
  };

  const siguientePosicion=()=>{
    const posPost=[...new Set(pedidos.filter(p=>p.marcaId===marcaConfig.id&&estadoItem(p)!=="completo").map(p=>p.posicion).filter(Boolean))].sort((a,b)=>POS_ORD.indexOf(a)-POS_ORD.indexOf(b));
    const idx=posPost.indexOf(posActiva);
    const sig=posPost[idx+1];
    if(sig) entrarPos(sig);
    else volverAPosiciones();
  };

  if(mostrarFinalizar) return <FinalizarMarca marcaConfig={marcaConfig} pedidos={pedidos} addModif={addModif} onVolver={()=>setMostrarFinalizar(false)} onConfirmar={()=>{setMostrarFinalizar(false);onMarcaCompleta();}}/>;

  if(itemsPend.length===0) return (
    <div style={{textAlign:"center",padding:40}}>
      <div style={{fontSize:40}}>🎉</div>
      <div style={{color:"#22c55e",fontWeight:700,fontSize:16,marginTop:8}}>¡{marcaConfig.label} completo!</div>
      <button onClick={()=>setMostrarFinalizar(true)} style={{marginTop:16,background:col,color:"#fff",border:"none",borderRadius:10,padding:"12px 28px",fontSize:15,fontWeight:900,cursor:"pointer",display:"block",width:"100%",maxWidth:300,margin:"16px auto 0"}}>Finalizar {marcaConfig.label} →</button>
      <button onClick={()=>setMostrarRevision(true)} style={{marginTop:10,background:"transparent",color:"#64748b",border:"1px solid #334155",borderRadius:10,padding:"10px 20px",fontSize:13,fontWeight:600,cursor:"pointer",display:"block",width:"100%",maxWidth:300,margin:"10px auto 0"}}>← Volver a revisar posiciones</button>
    </div>
  );

    const todasPosMarca=[...new Set(pedidos.filter(p=>p.marcaId===marcaConfig.id).map(p=>p.posicion).filter(Boolean))].sort((a,b)=>POS_ORD.indexOf(a)-POS_ORD.indexOf(b));
  const posParaMostrar=mostrarRevision?todasPosMarca:posicionesPend;

  if(mostrarRevision||vista==="posiciones") return (
    <div style={{padding:16}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <div style={{color:mostrarRevision?"#f59e0b":"#94a3b8",fontSize:11,fontWeight:700}}>
          {mostrarRevision?"REVISIÓN — "+marcaConfig.label.toUpperCase():marcaConfig.label.toUpperCase()+" · "+posicionesPend.length+" POSICIONES"}
        </div>
        <button onClick={()=>{setMostrarRevision(false);setMostrarFinalizar(true);}} style={{background:"#1e293b",color:col,border:"1px solid #334155",borderRadius:8,padding:"5px 11px",fontSize:12,fontWeight:700,cursor:"pointer"}}>Finalizar →</button>
      </div>
      {posParaMostrar.length===0&&(()=>{
        // Ítems de esta marca sin posición asignada
        const sinPos=pedidos.filter(p=>p.marcaId===marcaConfig.id&&estadoItem(p)!=="completo"&&!p.posicion);
        if(sinPos.length>0) return (
          <div style={{background:"#1a1000",border:"2px solid #f59e0b",borderRadius:12,padding:16,marginTop:8}}>
            <div style={{color:"#fcd34d",fontWeight:900,fontSize:15,marginBottom:8}}>⚠️ Ítems sin posición asignada</div>
            <div style={{color:"#94a3b8",fontSize:13,marginBottom:12}}>
              Hay <strong style={{color:"#f8fafc"}}>{sinPos.length} ítem/s</strong> de {marcaConfig.label} que no tienen posición en el mapa.<br/>
              Asignalos desde el <strong style={{color:"#f8fafc"}}>Mapa → posición del cliente</strong> antes de distribuir.
            </div>
            {[...new Set(sinPos.map(p=>p.cliente))].map(c=>{
              const its=sinPos.filter(p=>p.cliente===c);
              return (
                <div key={c} style={{background:"#0f172a",borderRadius:8,padding:"8px 12px",marginBottom:6}}>
                  <div style={{color:"#f8fafc",fontWeight:700,fontSize:13}}>👤 {c}</div>
                  {[...new Set(its.map(p=>p.productoId))].map(pid=>(
                    <div key={pid} style={{color:"#94a3b8",fontSize:12,marginTop:3}}>
                      · {PRODUCTOS.find(x=>x.id===pid)?.nombre||pid}
                      <span style={{color:"#ef4444",marginLeft:6}}>sin posición</span>
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
        );
        return null;
      })()}
      {posParaMostrar.map((pos,pi)=>{
        const vars=variedadesDePos(pos);
        const totalUnid=vars.reduce((s,v)=>s+v.pendiente,0);
        const clientes=[...new Set(vars.map(v=>v.cliente))];
        return (
          <button key={pos} onClick={()=>entrarPos(pos)} style={{width:"100%",background:"#1e293b",border:"1px solid #334155",borderLeft:"4px solid "+(pi===0?col:"#334155"),borderRadius:10,padding:"12px 14px",textAlign:"left",cursor:"pointer",marginBottom:8}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
              <div style={{background:pi===0?col:"#475569",color:"#fff",borderRadius:8,padding:"5px 10px",fontSize:20,fontWeight:900,minWidth:48,textAlign:"center"}}>{pos}</div>
              <div style={{flex:1}}>
                <div style={{color:"#f8fafc",fontWeight:700,fontSize:15}}>{clientes.join(", ")}</div>
              </div>
              <div style={{background:"#f59e0b",color:"#000",borderRadius:8,padding:"4px 12px",fontSize:22,fontWeight:900}}>{totalUnid}</div>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,paddingLeft:58}}>
              {vars.map(v=>(
                <span key={v.prodId} style={{background:"#0f172a",border:"1px solid #334155",borderRadius:6,padding:"3px 8px",fontSize:12,color:"#f8fafc"}}>
                  <span style={{color:col,fontWeight:700}}>{v.pendiente}</span> {NOMBRE_CORTO[v.prodId]||v.prod?.nombre}
                </span>
              ))}
            </div>
          </button>
        );
      })}
    </div>
  );

    const vars=variedadesDePos(posActiva)||[];
  const varIdxReal=Math.min(varIdx,Math.max(0,vars.length-1));
  const vActiva=vars[varIdxReal];
  if(!vActiva){setTimeout(siguientePosicion,100);return null;}
  const cantPend=vActiva.pendiente;
  const cantMostrar=cantEdit!==null?cantEdit:cantPend;
  const esFalt=cantMostrar<cantPend;
  const posPost=[...new Set(pedidos.filter(p=>p.marcaId===marcaConfig.id&&estadoItem(p)!=="completo").map(p=>p.posicion).filter(Boolean))].sort((a,b)=>POS_ORD.indexOf(a)-POS_ORD.indexOf(b));
  const idxPosActual=posPost.indexOf(posActiva);

  const barColorFn=(i)=>i===varIdxReal?col:(varIdxReal-i>0?"#22c55e":"#334155");
  return (
    <div style={{padding:16}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
        <button onClick={volverAPosiciones} style={{background:"transparent",color:"#64748b",border:"none",fontSize:13,cursor:"pointer",padding:0}}>← Posiciones</button>
        <span style={{color:"#475569",fontSize:11,marginLeft:"auto"}}>{idxPosActual+1}/{posPost.length}</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12,background:"#0f172a",borderRadius:10,padding:"10px 14px",border:"2px solid "+col}}>
        <div style={{background:col,color:"#000",borderRadius:8,padding:"6px 14px",fontSize:28,fontWeight:900,minWidth:60,textAlign:"center",letterSpacing:"-1px"}}>{posActiva}</div>
        <div>
          <div style={{color:"#94a3b8",fontSize:10,fontWeight:700,textTransform:"uppercase"}}>Posición activa</div>
          <div style={{color:"#f8fafc",fontWeight:700,fontSize:14}}>{vActiva.cliente}</div>
        </div>
      </div>
      <div style={{display:"flex",gap:4,marginBottom:14}}>
        {vars.map((v,i)=>(
          <div key={v.prodId} style={{flex:1,height:4,borderRadius:2,background:barColorFn(i,vars.length)}}/>
        ))}
      </div>
      <div style={{...S.card,padding:14,borderLeft:"4px solid "+col,marginBottom:12}}>
        <div style={{fontSize:11,color:col,fontWeight:700}}>{marcaConfig.label.toUpperCase()} · {posActiva}</div>
        <div style={{color:"#f8fafc",fontWeight:700,fontSize:18,marginTop:4}}>{NOMBRE_CORTO[vActiva.prodId]||vActiva.prod?.nombre}</div>
        <div style={{display:"flex",gap:16,marginTop:4}}>
          <div><span style={{color:"#94a3b8",fontSize:11}}>Pedido: </span><span style={{color:"#f59e0b",fontWeight:900,fontSize:18}}>{cantPend}</span></div>
          <div><span style={{color:"#94a3b8",fontSize:11}}>A entregar: </span><span style={{color:esFalt?"#ef4444":"#22c55e",fontWeight:900,fontSize:18}}>{cantMostrar}</span></div>
        </div>
      </div>
      <div style={{...S.card,padding:16,marginBottom:12,display:"flex",alignItems:"center",justifyContent:"center",gap:16}}>
        <button onClick={()=>setCantEdit(Math.max(0,(cantEdit!==null?cantEdit:cantPend)-1))} style={{background:"#0f172a",color:"#94a3b8",border:"1px solid #334155",borderRadius:10,width:48,height:48,fontSize:26,fontWeight:900,cursor:"pointer"}}>−</button>
        <div style={{textAlign:"center",minWidth:64}}>
          <div style={{color:esFalt?"#ef4444":"#22c55e",fontSize:40,fontWeight:900,lineHeight:1}}>{cantMostrar}</div>
          {cantMostrar!==cantPend&&<div style={{color:"#64748b",fontSize:11}}>pedido: {cantPend}</div>}
        </div>
        <button onClick={()=>setCantEdit((cantEdit!==null?cantEdit:cantPend)+1)} style={{background:"#0f172a",color:"#94a3b8",border:"1px solid #334155",borderRadius:10,width:48,height:48,fontSize:26,fontWeight:900,cursor:"pointer"}}>+</button>
      </div>
      {vars[varIdxReal+1]&&(
        <div style={{background:"#0f172a",borderRadius:8,padding:"8px 12px",marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
          <span style={{color:"#475569",fontSize:11}}>Siguiente:</span>
          <span style={{color:"#64748b",fontSize:12,fontWeight:700}}>{NOMBRE_CORTO[vars[varIdxReal+1].prodId]||vars[varIdxReal+1].prod?.nombre}</span>
          <span style={{color:"#475569",fontSize:11}}>×{vars[varIdxReal+1].pendiente}</span>
        </div>
      )}
      {varIdxReal!==vars.length-1?(
        <button onClick={confirmarVariedad} style={{...S.btnP,background:esFalt?"#b45309":cantMostrar>cantPend?"#7c3aed":"#1d4ed8",fontSize:15,padding:"14px",letterSpacing:"0.01em"}}>
          {esFalt?"⚠️ Faltante → sig. variedad":cantMostrar>cantPend?"➕ Agregado → sig. variedad":"✓ Confirmado → sig. variedad"}
        </button>
      ):(
        <button onClick={confirmarVariedad} style={{...S.btnP,background:esFalt?"#b45309":cantMostrar>cantPend?"#7c3aed":"#16a34a",fontSize:15,padding:"16px",letterSpacing:"0.01em",boxShadow:(esFalt||cantMostrar>cantPend)?"none":"0 0 0 3px #22c55e55"}}>
          {esFalt?"⚠️ Faltante → siguiente POSICIÓN":cantMostrar>cantPend?"➕ Agregado → siguiente POSICIÓN":"✅ Listo → siguiente POSICIÓN"}
        </button>
      )}
    </div>
  );
}

// ── PANTALLA FINALIZAR MARCA ──────────────────────────────────────────────────
function FinalizarMarca({marcaConfig, pedidos, onConfirmar, onVolver, addModif}){
  const col=marcaConfig.color;
  const itemsMarca=pedidos.filter(p=>p.marcaId===marcaConfig.id&&!PRODS_OCULTOS.has(p.productoId));
  const prodIds=[...new Set(itemsMarca.map(p=>p.productoId))];
  const grupos=prodIds.map(prodId=>{
    const prod=PRODUCTOS.find(x=>x.id===prodId);
    const items=itemsMarca.filter(p=>p.productoId===prodId);
    const esLF=items[0]?.marcaId==="LF_PANES"||items[0]?.marcaId==="LF_DULCE";
    const total=esLF?items.length:items.reduce((s,p)=>s+p.cantidad,0);
    const entregado=esLF?items.filter(p=>estadoItem(p)==="completo").length:items.reduce((s,p)=>s+p.entregado,0);
    return {prodId,prod,total,entregado,noTocado:entregado===0,completo:entregado>=total,parcial:entregado>0&&!(entregado>=total)};
  });
  const completos=grupos.filter(g=>g.completo);
  const parciales=grupos.filter(g=>g.parcial);
  const noTocados=grupos.filter(g=>g.noTocado);
  const hayProblemas=parciales.length>0||noTocados.length>0;
  return (
    <div style={{minHeight:"100vh",overflowY:"auto"}}>
      <div style={{maxWidth:520,margin:"0 auto",padding:16}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,paddingTop:16}}>
          <button onClick={onVolver} style={{background:"transparent",color:"#64748b",border:"none",fontSize:13,cursor:"pointer",padding:0}}>← Volver</button>
          <div>
            <h2 style={{margin:0,fontSize:18,fontWeight:900}}>Finalizar {marcaConfig.label}</h2>
            <p style={{margin:0,color:"#64748b",fontSize:12}}>Revisá el estado antes de confirmar</p>
          </div>
        </div>
        {hayProblemas&&(
          <div style={{background:"#3a1500",border:"1px solid #f59e0b",borderRadius:10,padding:"10px 14px",marginBottom:14}}>
            <div style={{color:"#fcd34d",fontWeight:800,fontSize:13,marginBottom:4}}>⚠️ Hay ítems sin completar</div>
            <div style={{color:"#94a3b8",fontSize:12,lineHeight:1.6}}>
              {noTocados.length>0&&<div>🔴 {noTocados.length} variedad/es no tocadas — faltante total si confirmás</div>}
              {parciales.length>0&&<div>🟡 {parciales.length} variedad/es entregadas parcialmente</div>}
            </div>
          </div>
        )}
        {noTocados.length>0&&(
          <div style={{marginBottom:12}}>
            <div style={{color:"#ef4444",fontSize:11,fontWeight:700,marginBottom:6}}>🔴 NO TOCADAS ({noTocados.length})</div>
            {noTocados.map(g=>(
              <div key={g.prodId} style={{background:"#3a0a0a",borderRadius:8,padding:"8px 12px",marginBottom:6,display:"flex",justifyContent:"space-between"}}>
                <span style={{color:"#f87171",fontSize:13,fontWeight:600}}>{NOMBRE_CORTO[g.prodId]||g.prod?.nombre}</span>
                <span style={{color:"#ef4444",fontWeight:900}}>0/{g.total}</span>
              </div>
            ))}
          </div>
        )}
        {parciales.length>0&&(
          <div style={{marginBottom:12}}>
            <div style={{color:"#f59e0b",fontSize:11,fontWeight:700,marginBottom:6}}>🟡 PARCIALES ({parciales.length})</div>
            {parciales.map(g=>(
              <div key={g.prodId} style={{background:"#3a2500",borderRadius:8,padding:"8px 12px",marginBottom:6,display:"flex",justifyContent:"space-between"}}>
                <span style={{color:"#fcd34d",fontSize:13,fontWeight:600}}>{NOMBRE_CORTO[g.prodId]||g.prod?.nombre}</span>
                <span style={{color:"#f59e0b",fontWeight:900}}>{g.entregado}/{g.total}</span>
              </div>
            ))}
          </div>
        )}
        {completos.length>0&&(
          <div style={{marginBottom:16}}>
            <div style={{color:"#22c55e",fontSize:11,fontWeight:700,marginBottom:6}}>✅ COMPLETOS ({completos.length})</div>
            {completos.map(g=>(
              <div key={g.prodId} style={{background:"#14532d22",borderRadius:8,padding:"8px 12px",marginBottom:6,display:"flex",justifyContent:"space-between"}}>
                <span style={{color:"#86efac",fontSize:13}}>{NOMBRE_CORTO[g.prodId]||g.prod?.nombre}</span>
                <span style={{color:"#22c55e",fontWeight:900}}>{g.total}/{g.total} ✓</span>
              </div>
            ))}
          </div>
        )}
        <button onClick={onVolver} style={{width:"100%",background:"#1e293b",color:"#94a3b8",border:"1px solid #334155",borderRadius:10,padding:"13px",fontSize:14,fontWeight:700,cursor:"pointer",marginBottom:8}}>← Volver a completar</button>
        <button onClick={()=>{
          // Construir lista de nuevos faltantes ANTES de tocar estado
          const nuevosFaltantes=[];
          if(addModif){
            [...noTocados,...parciales].forEach(g=>{
              const items=itemsMarca.filter(p=>p.productoId===g.prodId);
              items.forEach(p=>{
                const falt=p.cantidad-p.entregado;
                if(falt>0) nuevosFaltantes.push({tipo:"distribucion",pedidoId:p.id,productoId:g.prodId,
                  posicion:p.posicion,cliente:p.cliente,variedad:g.prod?.nombre||"",
                  cantOriginal:p.cantidad,cantReal:p.entregado,esFaltante:true,esAgregado:false,tipoMod:"faltante"});
              });
            });
            // Operación atómica: limpiar faltantes anteriores de esta marca Y agregar nuevos
            addModif({_reemplazarFaltantesMarca: marcaConfig.id, nuevosFaltantes});
          }
          onConfirmar();
        }} style={{width:"100%",background:hayProblemas?"#b45309":"#16a34a",color:"#fff",border:"none",borderRadius:10,padding:"14px",fontSize:15,fontWeight:900,cursor:"pointer"}}>
          {hayProblemas?"⚠️ Confirmar con faltantes → Siguiente marca":"✅ Confirmar y siguiente marca"}
        </button>
      </div>
    </div>
  );
}

// ── RESUMEN FINAL ─────────────────────────────────────────────────────────────
function ResumenFinal({pedidos, modifs, onIrReporte}){
  const faltantes=pedidos.filter(p=>p.entregado!==p.cantidad&&!PRODS_OCULTOS.has(p.productoId));
  const agregados=modifs.filter(m=>m.esAgregado);
  const faltantesPorMarca={};
  faltantes.forEach(p=>{
    if(!faltantesPorMarca[p.marcaId]) faltantesPorMarca[p.marcaId]=[];
    faltantesPorMarca[p.marcaId].push(p);
  });
  const totalFaltantes=faltantes.reduce((s,p)=>s+Math.abs(p.cantidad-p.entregado),0);
  const totalAgregados=agregados.reduce((s,m)=>s+(m.cantReal-m.cantOriginal),0);
  return (
    <div style={{minHeight:"100vh",overflowY:"auto"}}>
      <div style={{maxWidth:520,margin:"0 auto",padding:16,paddingTop:24}}>
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{fontSize:52}}>🏁</div>
          <h2 style={{color:"#f8fafc",fontSize:22,fontWeight:900,margin:"8px 0 4px"}}>¡Jornada completada!</h2>
          <p style={{color:"#64748b",fontSize:13,margin:0}}>Resumen de faltantes y extras</p>
        </div>
        <div style={{display:"flex",gap:10,marginBottom:16}}>
          <div style={{flex:1,background:"#1e293b",border:"1px solid #334155",borderRadius:10,padding:"12px",textAlign:"center"}}>
            <div style={{color:totalFaltantes===0?"#22c55e":"#ef4444",fontSize:28,fontWeight:900}}>{totalFaltantes}</div>
            <div style={{color:"#94a3b8",fontSize:11,fontWeight:700}}>FALTANTES</div>
          </div>
          <div style={{flex:1,background:"#1e293b",border:"1px solid #334155",borderRadius:10,padding:"12px",textAlign:"center"}}>
            <div style={{color:totalAgregados===0?"#475569":"#f59e0b",fontSize:28,fontWeight:900}}>{totalAgregados}</div>
            <div style={{color:"#94a3b8",fontSize:11,fontWeight:700}}>EXTRAS</div>
          </div>
        </div>
        {totalFaltantes===0&&(
          <div style={{background:"#14532d22",border:"1px solid #22c55e44",borderRadius:10,padding:"14px",textAlign:"center",marginBottom:16}}>
            <div style={{color:"#22c55e",fontWeight:700,fontSize:15}}>✅ Sin faltantes — todo entregado</div>
          </div>
        )}
        {Object.keys(faltantesPorMarca).length>0&&(
          <div style={{marginBottom:16}}>
            <div style={{color:"#ef4444",fontSize:11,fontWeight:700,marginBottom:8}}>🔴 FALTANTES POR MARCA</div>
            {ORDEN_MARCAS.filter(m=>faltantesPorMarca[m.id]).map(marca=>{
              const items=faltantesPorMarca[marca.id];
              const prodIds=[...new Set(items.map(p=>p.productoId))];
              return (
                <div key={marca.id} style={{background:"#1e293b",borderLeft:"3px solid "+marca.color,borderRadius:8,padding:"10px 12px",marginBottom:8}}>
                  <div style={{color:marca.color,fontSize:12,fontWeight:700,marginBottom:6}}>{marca.label}</div>
                  {prodIds.map(prodId=>{
                    const prod=PRODUCTOS.find(x=>x.id===prodId);
                    const its=items.filter(p=>p.productoId===prodId);
                    const esLF=its[0]?.marcaId==="LF_PANES"||its[0]?.marcaId==="LF_DULCE";
                    const cantFalt=esLF?its.filter(p=>p.entregado===0).length:its.reduce((s,p)=>s+Math.abs(p.cantidad-p.entregado),0);
                    const clientes=[...new Set(its.map(p=>p.cliente))];
                    return (
                      <div key={prodId} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid #0f172a"}}>
                        <div>
                          <div style={{color:"#f87171",fontSize:13,fontWeight:600}}>{NOMBRE_CORTO[prodId]||prod?.nombre}</div>
                          <div style={{color:"#64748b",fontSize:10}}>{clientes.slice(0,3).join(", ")}{clientes.length>3?" +más":""}</div>
                        </div>
                        <span style={{color:"#ef4444",fontWeight:900}}>-{cantFalt}</span>
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        )}
        <button onClick={onIrReporte} style={{width:"100%",background:"#3b82f6",color:"#fff",border:"none",borderRadius:10,padding:"14px",fontSize:15,fontWeight:900,cursor:"pointer"}}>📋 Ver reporte completo</button>
      </div>
    </div>
  );
}

// ── MAPA ──────────────────────────────────────────────────────────────────────
function MapaDeposito({pedidos, setPedidos, addModif}){
  const [posSeleccionada,setPosSeleccionada]=useState(null);

  const estPorPos={};
  TODAS_POS.forEach(pos=>{
    const ps=pedidos.filter(p=>p.posicion===pos);
    if(!ps.length){estPorPos[pos]="vacio";return;}
    if(ps.every(p=>estadoItem(p)==="completo"))estPorPos[pos]="completo";
    else if(ps.some(p=>p.entregado>0))estPorPos[pos]="parcial";
    else estPorPos[pos]="pendiente";
  });
  const C={vacio:{bg:"#0f172a",b:"#1e293b",c:"#334155"},pendiente:{bg:"#7f1d1d",b:"#ef4444",c:"#fca5a5"},parcial:{bg:"#713f12",b:"#f59e0b",c:"#fcd34d"},completo:{bg:"#14532d",b:"#22c55e",c:"#86efac"}};

  const itemsPos = posSeleccionada ? pedidos.filter(p=>p.posicion===posSeleccionada) : [];

  return (
    <div style={{padding:16}}>
      <div style={{color:"#64748b",fontSize:11,marginBottom:8,textAlign:"center"}}>Tocá una posición para ver el detalle</div>
      <div style={{display:"flex",gap:5}}>
        {["A","B"].map((lado,li)=>(
          <React.Fragment key={lado}>
            {li===1&&<div style={{width:18,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{writingMode:"vertical-rl",fontSize:8,color:"#334155",fontWeight:700,letterSpacing:2}}>PASILLO</div></div>}
            <div style={{display:"flex",flexDirection:"column",gap:3,flex:1}}>
              <div style={{textAlign:"center",fontSize:10,color:"#475569",fontWeight:700,marginBottom:2}}>LADO {lado}</div>
              {Array.from({length:15},(_,i)=>`${lado}${i+1}`).map(pos=>{
                const est=estPorPos[pos],c=C[est];
                const cls=[...new Set(pedidos.filter(p=>p.posicion===pos).map(p=>p.cliente))];
                const zona=zonaDePos(pos);
                const zonaBorder=zona===1?"#22c55e33":zona===2?"#3b82f633":"#b5179e33";
                const seleccionada=posSeleccionada===pos;
                return (
                  <div key={pos} onClick={()=>setPosSeleccionada(seleccionada?null:pos)}
                    style={{background:seleccionada?"#1e3a5f":c.bg,border:`${seleccionada?"2px":"1px"} solid ${seleccionada?"#3b82f6":est==="vacio"?zonaBorder:c.b}`,borderRadius:5,padding:"4px 3px",textAlign:"center",fontSize:10,fontWeight:700,color:seleccionada?"#93c5fd":c.c,minHeight:30,cursor:"pointer",transition:"all 0.15s"}}>
                    <div>{pos}</div>
                    {cls.length>0&&<div style={{fontSize:7,opacity:0.85,overflow:"hidden",lineHeight:1.2}}>
                      {cls.slice(0,2).map(n=>n.length>10?n.slice(0,9)+"…":n).join(", ")}{cls.length>2?` +${cls.length-2}`:""}
                    </div>}
                  </div>
                );
              })}
            </div>
          </React.Fragment>
        ))}
      </div>

      {/* Detalle de posición seleccionada */}
      {posSeleccionada&&(
        <DetallePosicion
          pos={posSeleccionada}
          items={itemsPos}
          todosPedidos={pedidos}
          setPedidos={setPedidos}
          addModif={addModif}
          onCerrar={()=>setPosSeleccionada(null)}
        />
      )}

      <div style={{display:"flex",gap:10,marginTop:12,justifyContent:"center",flexWrap:"wrap"}}>
        {[["pendiente","🔴 Pend."],["parcial","🟡 Parcial"],["completo","🟢 Listo"],["vacio","⚫ Vacío"]].map(([k,l])=>(
          <span key={k} style={{fontSize:11,color:"#64748b"}}>{l}</span>
        ))}
      </div>
      <div style={{display:"flex",gap:8,marginTop:8,justifyContent:"center"}}>
        {[["#22c55e","Z1: 1-5"],["#3b82f6","Z2: 6-10"],["#b5179e","Z3: 11-15"]].map(([c,l])=>(
          <span key={l} style={{fontSize:10,color:c,fontWeight:700}}>{l}</span>
        ))}
      </div>
    </div>
  );
}

// ── DETALLE POSICION (agrupado + contador paralelo) ───────────────────────────
function DetallePosicion({pos, items, todosPedidos, setPedidos, addModif, onCerrar}){
  const [verTab,setVerTab]=useState("resumen"); // resumen | contador | items
    const [conteo,setConteo]=useState({});

    const clientesPos=[...new Set(items.map(p=>p.cliente))];

  // Agrupar por marca + productoId para La Francia; por producto para el resto
  const esLF=p=>p.marcaId==="LF_PANES"||p.marcaId==="LF_DULCE";

    const grupos=[];
  const prodIds=[...new Set(items.map(p=>p.productoId))];
  prodIds.forEach(prodId=>{
    const prod=PRODUCTOS.find(x=>x.id===prodId);
    const marca=ORDEN_MARCAS.find(m=>m.id===prod?.marcaId);
    const itemsProd=items.filter(p=>p.productoId===prodId);
    if(esLF(itemsProd[0])){
            const clientesProd=[...new Set(itemsProd.map(p=>p.cliente))];
      clientesProd.forEach(cliente=>{
        const its=itemsProd.filter(p=>p.cliente===cliente);
        const total=its.length; // cada ítem LF = 1 unidad
        const entregado=its.filter(p=>estadoItem(p)==="completo").length;
        grupos.push({prodId,prod,marca,cliente,total,entregado,esLF:true,items:its});
      });
    } else {
            const clientesProd=[...new Set(itemsProd.map(p=>p.cliente))];
      clientesProd.forEach(cliente=>{
        const its=itemsProd.filter(p=>p.cliente===cliente);
        const total=its.reduce((s,p)=>s+p.cantidad,0);
        const entregado=its.reduce((s,p)=>s+p.entregado,0);
        grupos.push({prodId,prod,marca,cliente,total,entregado,esLF:false,items:its});
      });
    }
  });

    const totalUnidades=grupos.reduce((s,g)=>s+g.total,0);
  const entregadoTotal=grupos.reduce((s,g)=>s+g.entregado,0);

  const sumarConteo=(prodId)=>setConteo(prev=>({...prev,[prodId]:(prev[prodId]||0)+1}));
  const resetConteo=()=>setConteo({});

  const tabStyle=(k)=>({
    flex:1,background:"transparent",
    color:verTab===k?"#f8fafc":"#64748b",
    border:"none",borderBottom:verTab===k?"2px solid #3b82f6":"2px solid transparent",
    padding:"8px 4px",fontSize:12,fontWeight:700,cursor:"pointer",
  });

  return (
    <div style={{marginTop:16,background:"#1e293b",borderRadius:12,padding:14,border:"1px solid #3b82f6",animation:"popIn 0.2s ease"}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
        <div>
          <div style={{color:"#93c5fd",fontWeight:900,fontSize:16}}>📍 Posición {pos}</div>
          <div style={{color:"#64748b",fontSize:11,marginTop:2}}>
            {clientesPos.join(" · ")} · {totalUnidades} unidades
          </div>
        </div>
        <button onClick={onCerrar} style={{background:"#0f172a",color:"#64748b",border:"1px solid #334155",borderRadius:6,padding:"4px 8px",fontSize:12,cursor:"pointer"}}>✕</button>
      </div>

      {items.length===0?(
        <div style={{color:"#475569",fontSize:13,textAlign:"center",padding:8}}>Sin pedidos asignados</div>
      ):(
        <>
          {/* Tabs */}
          <div style={{display:"flex",borderBottom:"1px solid #334155",marginBottom:10}}>
            <button onClick={()=>setVerTab("resumen")} style={tabStyle("resumen")}>📋 Resumen</button>
            <button onClick={()=>setVerTab("contador")} style={tabStyle("contador")}>🔢 Contar</button>
            <button onClick={()=>setVerTab("items")} style={tabStyle("items")}>📦 Ítems</button>
          </div>

          {/* TAB RESUMEN — agrupado por variedad */}
          {verTab==="resumen"&&(
            <div>
              {grupos.map((g,i)=>{
                const pct=g.total>0?Math.round((g.entregado/g.total)*100):0;
                const color=g.entregado===0?"#ef4444":g.entregado===g.total?"#22c55e":"#f59e0b";
                return (
                  <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:"1px solid #1e293b"}}>
                    <div style={{flex:1}}>
                      <div style={{color:"#f8fafc",fontSize:13,fontWeight:700}}>{NOMBRE_CORTO[g.prodId]||g.prod?.nombre}</div>
                      <div style={{color:"#64748b",fontSize:11}}>{g.cliente} · <span style={{color:g.marca?.color||"#94a3b8"}}>{g.marca?.label}</span></div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{color:color,fontWeight:900,fontSize:16}}>{g.entregado}<span style={{color:"#475569",fontSize:12,fontWeight:400}}>/{g.total}</span></div>
                      <div style={{color:"#475569",fontSize:10}}>{pct}%</div>
                    </div>
                  </div>
                );
              })}
              <div style={{display:"flex",justifyContent:"space-between",marginTop:10,paddingTop:8,borderTop:"1px solid #334155"}}>
                <span style={{color:"#94a3b8",fontSize:12,fontWeight:700}}>TOTAL</span>
                <span style={{color:"#f8fafc",fontWeight:900,fontSize:15}}>{entregadoTotal}/{totalUnidades}</span>
              </div>
            </div>
          )}

          {/* TAB CONTADOR — control de calidad */}
          {verTab==="contador"&&(
            <div>
              <div style={{background:"#0f172a",borderRadius:8,padding:"8px 12px",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <span style={{color:"#64748b",fontSize:11}}>Contá físicamente y verificá que coincida con el pedido</span>
                <button onClick={resetConteo} style={{background:"#334155",color:"#94a3b8",border:"none",borderRadius:6,padding:"3px 8px",fontSize:11,cursor:"pointer"}}>↺ Reset</button>
              </div>
              {grupos.map((g,i)=>{
                const cnt=conteo[g.prodId+"|"+g.cliente]||0;
                const key=g.prodId+"|"+g.cliente;
                const ok=cnt===g.total;
                const excede=cnt>g.total;
                const borderColor=cnt===0?"#334155":excede?"#ef4444":ok?"#22c55e":"#f59e0b";
                const bgColor=cnt===0?"#0f172a":excede?"#3a0a0a":ok?"#14532d33":"#3a2500";
                return (
                  <div key={i} style={{background:bgColor,border:`1px solid ${borderColor}`,borderRadius:10,padding:"10px 12px",marginBottom:8,transition:"all 0.2s"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <div style={{flex:1}}>
                        <div style={{color:"#f8fafc",fontSize:13,fontWeight:700}}>{NOMBRE_CORTO[g.prodId]||g.prod?.nombre}</div>
                        <div style={{color:"#64748b",fontSize:11}}>{g.cliente}</div>
                      </div>
                      {/* Contador */}
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <button onClick={()=>setConteo(prev=>({...prev,[key]:Math.max(0,(prev[key]||0)-1)}))}
                          style={{background:"#1e293b",color:"#f8fafc",border:"1px solid #334155",borderRadius:8,width:34,height:34,fontSize:20,fontWeight:900,cursor:"pointer",lineHeight:1}}>−</button>
                        <div style={{textAlign:"center",minWidth:48}}>
                          <div style={{color:excede?"#ef4444":ok?"#22c55e":"#f8fafc",fontSize:26,fontWeight:900,lineHeight:1}}>{cnt}</div>
                          <div style={{color:"#475569",fontSize:10}}>de {g.total}</div>
                        </div>
                        <button onClick={()=>sumarConteo(key)}
                          style={{background:ok?"#14532d":"#1e293b",color:ok?"#86efac":"#f8fafc",border:`1px solid ${ok?"#22c55e":"#334155"}`,borderRadius:8,width:34,height:34,fontSize:20,fontWeight:900,cursor:"pointer",lineHeight:1}}>+</button>
                      </div>
                      {/* Estado */}
                      <div style={{fontSize:20}}>{cnt===0?"⬜":excede?"🔴":ok?"✅":"🟡"}</div>
                    </div>
                    {excede&&<div style={{color:"#ef4444",fontSize:11,fontWeight:700,marginTop:4}}>⚠️ Contaste {cnt-g.total} de más</div>}
                    {ok&&cnt>0&&<div style={{color:"#22c55e",fontSize:11,fontWeight:700,marginTop:4}}>✓ Coincide con el pedido</div>}
                  </div>
                );
              })}
              {/* Resumen del conteo */}
              {Object.keys(conteo).length>0&&(
                <div style={{background:"#1e293b",borderRadius:8,padding:10,marginTop:4,border:"1px solid #334155"}}>
                  {grupos.every(g=>(conteo[g.prodId+"|"+g.cliente]||0)===g.total)?(
                    <div style={{color:"#22c55e",fontWeight:900,fontSize:14,textAlign:"center"}}>✅ Posición {pos} verificada</div>
                  ):(
                    <div style={{color:"#f59e0b",fontWeight:700,fontSize:13,textAlign:"center"}}>
                      {grupos.filter(g=>(conteo[g.prodId+"|"+g.cliente]||0)===g.total).length}/{grupos.length} variedades verificadas
                    </div>
                  )}
                </div>
              )}
            </div>
          )}

          {/* TAB ITEMS — agrupado por variedad+cliente */}
          {verTab==="items"&&(()=>{
            const grupos={};
            items.forEach(p=>{
              const key=p.productoId+"||"+p.cliente;
              if(!grupos[key]) grupos[key]={productoId:p.productoId,cliente:p.cliente,marcaId:p.marcaId,posicion:p.posicion,cantidad:0,entregado:0,_repId:p.id,_ids:[]};
              grupos[key].cantidad+=p.cantidad;
              grupos[key].entregado+=p.entregado||0;
              grupos[key]._ids.push(p.id);
            });
            return Object.values(grupos).map(g=>{
              const prod=PRODUCTOS.find(x=>x.id===g.productoId);
              const marca=ORDEN_MARCAS.find(m=>m.id===g.marcaId);
              const estadoG=g.entregado===0?"pendiente":g.entregado>=g.cantidad?"completo":"parcial";
              const itemRep=items.find(p=>p.id===g._repId);
              return <DetallePosItem key={g.productoId+"_"+g.cliente}
                item={{...itemRep,cantidad:g.cantidad,entregado:g.entregado,_ids:g._ids}}
                prod={prod} marca={marca} estado={estadoG}
                setPedidos={setPedidos} addModif={addModif}
                todosPedidos={todosPedidos} todasLasPosiciones={TODAS_POS}/>;
            });
          })()}
        </>
      )}
    </div>
  );
}

function DetallePosItem({item, prod, marca, estado, setPedidos, addModif, todosPedidos, todasLasPosiciones}){
  const [modo,setModo]=useState(null); // null | "cantidad" | "posicion"
  const [val,setVal]=useState(String(item.entregado||0));
  const [nuevaPos,setNuevaPos]=useState("");
  const colorEstado=estado==="completo"?"#22c55e":estado==="parcial"?"#f59e0b":"#ef4444";

  const guardarCantidad=()=>{
    const n=parseInt(val)||0;
    const esAgregado=n>item.cantidad;
    const esFaltante=n<item.cantidad&&n>=0;
    setPedidos(prev=>prev.map(p=>p.id===item.id?{...p,entregado:n,esFaltante:n===0,esAgregado}:p));
    // Registrar en reporte si hay diferencia con el pedido original
    if(addModif&&esAgregado){
      addModif({tipo:"picking",pedidoId:item.id,productoId:item.productoId,posicion:item.posicion,
        cliente:item.cliente,variedad:prod?.nombre||item.productoId,
        cantOriginal:item.cantidad,cantReal:n,esFaltante:false,esAgregado:true,tipoMod:"agregado_manual"});
    }
    setModo(null);
  };

  const [clienteDestino,setClienteDestino]=useState("");
  const [cantMover,setCantMover]=useState(1);

  const guardarPosicion=()=>{
    if(!nuevaPos||!clienteDestino||cantMover<1) return;
    const cantAMover=Math.min(cantMover, item.cantidad);
    // Ítems del origen a marcar como faltante (tomar los primeros cantAMover ids)
    const idsOrigen=(item._ids||[item.id]).slice(0,cantAMover);
    // Ítem(s) del cliente destino en nueva posición con mismo producto
    const itemsDestino=(todosPedidos||[]).filter(p=>
      p.cliente===clienteDestino&&p.posicion===nuevaPos&&p.productoId===item.productoId&&estadoItem(p)!=="completo"
    ).slice(0,cantAMover);
    setPedidos(prev=>prev.map(p=>{
      if(idsOrigen.includes(p.id)) return {...p,entregado:0,esFaltante:true,esAgregado:false};
      const destIdx=itemsDestino.findIndex(d=>d.id===p.id);
      if(destIdx>=0) return {...p,entregado:Math.min(p.entregado+1,p.cantidad)};
      return p;
    }));
    idsOrigen.forEach(id=>{
      if(addModif) addModif({tipo:"picking",pedidoId:id,productoId:item.productoId,
        posicion:item.posicion,cliente:item.cliente,variedad:prod?.nombre||item.productoId,
        cantOriginal:1,cantReal:0,esFaltante:true,esAgregado:false,tipoMod:"faltante"});
    });
    setModo(null);
    setNuevaPos("");
    setClienteDestino("");
    setCantMover(1);
  };

  return (
    <div style={{borderBottom:"1px solid #334155",padding:"10px 0"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:modo?8:0}}>
        <div style={{flex:1}}>
          <div style={{color:"#f8fafc",fontSize:13,fontWeight:700}}>{prod?.nombre||item.productoId}</div>
          <div style={{display:"flex",gap:6,marginTop:2,flexWrap:"wrap"}}>
            <span style={{color:"#64748b",fontSize:11}}>{item.cliente}</span>
            {marca&&<span style={{color:marca.color,fontSize:10,fontWeight:700}}>{marca.label}</span>}
            <span style={{color:colorEstado,fontSize:11,fontWeight:700}}>{estado}</span>
            {item.reasignado&&<span style={{color:"#a78bfa",fontSize:10,fontWeight:700}}>↻ reasignado</span>}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <span style={{color:colorEstado,fontWeight:900,fontSize:16}}>{item.entregado||0}</span>
          <span style={{color:"#475569",fontSize:11}}>/ {item.cantidad}</span>
        </div>
        {modo===null&&(
          <div style={{display:"flex",gap:4}}>
            <button onClick={()=>setModo("cantidad")} style={{background:"#1e3a5f",color:"#93c5fd",border:"1px solid #3b82f644",borderRadius:6,padding:"4px 7px",fontSize:11,cursor:"pointer"}} title="Editar cantidad">✏️</button>
            <button onClick={()=>setModo("posicion")} style={{background:"#2d1b4e",color:"#a78bfa",border:"1px solid #a78bfa44",borderRadius:6,padding:"4px 7px",fontSize:11,cursor:"pointer"}} title="Mover a otra posición">📍</button>
          </div>
        )}
      </div>

      {/* Editar cantidad */}
      {modo==="cantidad"&&(
        <div style={{background:"#0f172a",borderRadius:8,padding:10,display:"flex",gap:6,alignItems:"center"}}>
          <span style={{color:"#64748b",fontSize:12,flex:1}}>Cantidad entregada:</span>
          <input type="number" value={val} onChange={e=>setVal(e.target.value)} min="0"
            style={{width:55,background:"#1e293b",color:"#f8fafc",border:"1px solid #3b82f6",borderRadius:6,padding:"5px 8px",fontSize:14,textAlign:"center"}}/>
          <button onClick={guardarCantidad} style={{background:"#22c55e",color:"#000",border:"none",borderRadius:6,padding:"5px 10px",fontSize:12,fontWeight:700,cursor:"pointer"}}>✓</button>
          <button onClick={()=>setModo(null)} style={{background:"#334155",color:"#94a3b8",border:"none",borderRadius:6,padding:"5px 8px",fontSize:12,cursor:"pointer"}}>✕</button>
        </div>
      )}

      {/* Traspasar unidad a otro cliente */}
      {modo==="posicion"&&(
        <div style={{background:"#0f172a",borderRadius:8,padding:10}}>
          <div style={{color:"#a78bfa",fontSize:12,fontWeight:700,marginBottom:8}}>
            📍 Traspasar de <strong style={{color:"#f8fafc"}}>{item.cliente}</strong>
          </div>

          {/* Cantidad a mover */}
          <div style={{color:"#64748b",fontSize:11,marginBottom:5}}>1. ¿Cuántas unidades traspasar? (tiene {item.cantidad}):</div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,background:"rgba(0,0,0,0.2)",borderRadius:8,padding:"8px 12px"}}>
            <button onClick={()=>setCantMover(c=>Math.max(1,c-1))} style={{background:"#0f172a",color:"#94a3b8",border:"1px solid #334155",borderRadius:6,width:32,height:32,fontSize:18,fontWeight:900,cursor:"pointer"}}>−</button>
            <span style={{color:"#a78bfa",fontSize:26,fontWeight:900,minWidth:36,textAlign:"center"}}>{cantMover}</span>
            <button onClick={()=>setCantMover(c=>Math.min(c+1,item.cantidad))} style={{background:"#0f172a",color:"#94a3b8",border:"1px solid #334155",borderRadius:6,width:32,height:32,fontSize:18,fontWeight:900,cursor:"pointer"}}>+</button>
            <span style={{color:"#475569",fontSize:11}}>de {item.cantidad} total</span>
          </div>

          {/* Paso 2: elegir posición destino */}
          <div style={{color:"#64748b",fontSize:11,marginBottom:5}}>2. Posición destino:</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10,maxHeight:100,overflowY:"auto"}}>
            {todasLasPosiciones.filter(p=>p!==item.posicion).map(p=>{
              const tieneProducto=(todosPedidos||[]).some(x=>x.posicion===p&&x.productoId===item.productoId&&estadoItem(x)!=="completo");
              return (
                <button key={p} onClick={()=>{setNuevaPos(p);setClienteDestino("");}}
                  style={{background:nuevaPos===p?"#4c1d95":tieneProducto?"#1a2744":"#0f172a",
                    color:nuevaPos===p?"#e9d5ff":tieneProducto?"#93c5fd":"#475569",
                    border:`1px solid ${nuevaPos===p?"#a78bfa":tieneProducto?"#3b82f6":"#1e293b"}`,
                    borderRadius:6,padding:"4px 10px",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                  {p}
                </button>
              );
            })}
          </div>

          {/* Paso 2: elegir cliente destino en esa posición */}
          {nuevaPos&&(()=>{
            const clientesDestino=[...new Set((todosPedidos||[])
              .filter(p=>p.posicion===nuevaPos&&p.productoId===item.productoId&&estadoItem(p)!=="completo")
              .map(p=>p.cliente))];
            return clientesDestino.length>0?(
              <>
                <div style={{color:"#64748b",fontSize:11,marginBottom:5}}>3. Cliente que lo recibe en {nuevaPos}:</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
                  {clientesDestino.map(c=>(
                    <button key={c} onClick={()=>setClienteDestino(c)}
                      style={{background:clienteDestino===c?"#4c1d95":"#1e293b",color:clienteDestino===c?"#e9d5ff":"#94a3b8",
                        border:`1px solid ${clienteDestino===c?"#a78bfa":"#334155"}`,borderRadius:6,padding:"5px 10px",fontSize:12,cursor:"pointer"}}>
                      {c}
                    </button>
                  ))}
                </div>
              </>
            ):(
              <div style={{color:"#ef4444",fontSize:11,marginBottom:10}}>⚠️ No hay pedidos pendientes de este producto en {nuevaPos}</div>
            );
          })()}

          <div style={{display:"flex",gap:6}}>
            <button onClick={guardarPosicion} disabled={!nuevaPos||!clienteDestino}
              style={{flex:1,background:(nuevaPos&&clienteDestino)?"#7c3aed":"#334155",color:(nuevaPos&&clienteDestino)?"#fff":"#64748b",border:"none",borderRadius:6,padding:"8px",fontSize:13,fontWeight:700,cursor:(nuevaPos&&clienteDestino)?"pointer":"default"}}>
              ↻ Traspasar {cantMover}u → {nuevaPos||"..."} / {clienteDestino||"..."}
            </button>
            <button onClick={()=>{setModo(null);setNuevaPos("");setClienteDestino("");setCantMover(1);}} style={{background:"#334155",color:"#94a3b8",border:"none",borderRadius:6,padding:"8px 12px",fontSize:12,cursor:"pointer"}}>✕</button>
          </div>
          <div style={{color:"#475569",fontSize:10,marginTop:6}}>Las {cantMover} unidades se marcan como faltantes en {item.posicion} y se suman al cliente en {nuevaPos||"destino"}.</div>
        </div>
      )}
    </div>
  );
}

// ── DASHBOARD PERFORMANCE ─────────────────────────────────────────────────────
function DashboardPerformance({pedidos, operario, onCerrar}){
  const [verTab,setVerTab]=useState("general"); // general | porOperario | variedades

  // Solo ítems de picking (La Francia) con timestamp
  const itemsLF=pedidos.filter(p=>p.tsConfirmado&&(p.marcaId==="LF_PANES"||p.marcaId==="LF_DULCE"));

    const operarios=[...new Set(itemsLF.map(p=>p.operarioConfirmo).filter(Boolean))];

    const statsOperario=operarios.map(op=>{
    const items=[...itemsLF.filter(p=>p.operarioConfirmo===op)].sort((a,b)=>a.tsConfirmado-b.tsConfirmado);
    const unidades=items.reduce((s,p)=>s+p.entregado,0);
    let tiempos=[];
    for(let i=1;i<items.length;i++){
      const diff=(items[i].tsConfirmado-items[i-1].tsConfirmado)/1000;
      if(diff<300) tiempos.push(diff); // ignorar gaps >5min (pausa)
    }
    const promSeg=tiempos.length?Math.round(tiempos.reduce((s,t)=>s+t,0)/tiempos.length):null;
    return {op, unidades, promSeg, total:items.length};
  }).sort((a,b)=>b.unidades-a.unidades);

    const totalUnidades=itemsLF.reduce((s,p)=>s+p.entregado,0);
  const todosTiempos=[];
  const itemsOrdenados=[...itemsLF].sort((a,b)=>a.tsConfirmado-b.tsConfirmado);
  for(let i=1;i<itemsOrdenados.length;i++){
    const diff=(itemsOrdenados[i].tsConfirmado-itemsOrdenados[i-1].tsConfirmado)/1000;
    if(diff<300) todosTiempos.push(diff);
  }
  const promGeneral=todosTiempos.length?Math.round(todosTiempos.reduce((s,t)=>s+t,0)/todosTiempos.length):null;

    const variedades=[...new Set(itemsLF.map(p=>p.productoId))];
  const statsVariedad=variedades.map(vid=>{
    const items=itemsLF.filter(p=>p.productoId===vid).sort((a,b)=>a.tsConfirmado-b.tsConfirmado);
    const nombre=NOMBRE_CORTO[vid]||vid;
    const unidades=items.reduce((s,p)=>s+p.entregado,0);
    let tiempos=[];
    for(let i=1;i<items.length;i++){
      const diff=(items[i].tsConfirmado-items[i-1].tsConfirmado)/1000;
      if(diff<300) tiempos.push(diff);
    }
    const prom=tiempos.length?Math.round(tiempos.reduce((s,t)=>s+t,0)/tiempos.length):null;
    return {vid,nombre,unidades,prom,entregas:items.length};
  }).sort((a,b)=>b.unidades-a.unidades);

  const fmtSeg=(s)=>{
    if(s===null) return "—";
    if(s<60) return `${s}s`;
    return `${Math.floor(s/60)}m ${s%60}s`;
  };

  const colores=["#3b82f6","#22c55e","#f59e0b","#e85d04"];

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",zIndex:9999,display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto"}}>
      <div style={{background:"#1e293b",borderBottom:"1px solid #334155",padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{color:"#a78bfa",fontWeight:900,fontSize:18}}>📊 Performance de Jornada</div>
          <div style={{color:"#64748b",fontSize:12,marginTop:2}}>{totalUnidades} unidades · {itemsLF.length} entregas registradas</div>
        </div>
        <button onClick={onCerrar} style={{background:"#0f172a",color:"#64748b",border:"1px solid #334155",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:14}}>✕</button>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",borderBottom:"1px solid #334155",background:"#0f172a"}}>
        {[["general","🏁 General"],["porOperario","👤 Por operario"],["variedades","🍞 Variedades"]].map(([k,l])=>(
          <button key={k} onClick={()=>setVerTab(k)} style={{flex:1,background:"transparent",color:verTab===k?"#a78bfa":"#64748b",border:"none",borderBottom:verTab===k?"2px solid #a78bfa":"2px solid transparent",padding:"10px 4px",fontSize:12,fontWeight:700,cursor:"pointer"}}>
            {l}
          </button>
        ))}
      </div>

      <div style={{flex:1,overflowY:"auto",padding:16}}>

        {/* GENERAL */}
        {verTab==="general"&&(
          <>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
              {[
                {l:"Total unidades",v:totalUnidades,c:"#a78bfa"},
                {l:"Entregas confirmadas",v:itemsLF.length,c:"#3b82f6"},
                {l:"Tiempo prom. entre entregas",v:fmtSeg(promGeneral),c:"#22c55e"},
                {l:"Operarios activos",v:operarios.length,c:"#f59e0b"},
              ].map(k=>(
                <div key={k.l} style={{background:"#1e293b",border:`1px solid ${k.c}33`,borderRadius:10,padding:"12px",textAlign:"center"}}>
                  <div style={{color:k.c,fontSize:22,fontWeight:900,lineHeight:1}}>{k.v}</div>
                  <div style={{color:"#64748b",fontSize:10,marginTop:4}}>{k.l}</div>
                </div>
              ))}
            </div>
            {/* Ranking operarios rápido */}
            <div style={{background:"#1e293b",borderRadius:10,padding:12,marginBottom:10}}>
              <div style={{color:"#64748b",fontSize:11,fontWeight:700,marginBottom:10}}>RANKING DE UNIDADES</div>
              {statsOperario.map((s,i)=>(
                <div key={s.op} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                  <div style={{color:colores[i]||"#64748b",fontWeight:900,fontSize:16,width:20}}>{i+1}</div>
                  <div style={{flex:1}}>
                    <div style={{color:"#f8fafc",fontWeight:700,fontSize:13}}>{s.op}</div>
                    <div style={{background:"#0f172a",borderRadius:99,height:5,marginTop:4,overflow:"hidden"}}>
                      <div style={{background:colores[i]||"#334155",height:"100%",width:`${statsOperario[0].unidades>0?(s.unidades/statsOperario[0].unidades)*100:0}%`,transition:"width 0.5s"}}/>
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{color:colores[i]||"#64748b",fontWeight:900,fontSize:15}}>{s.unidades}</div>
                    <div style={{color:"#475569",fontSize:10}}>unidades</div>
                  </div>
                </div>
              ))}
            </div>
          </>
        )}

        {/* POR OPERARIO */}
        {verTab==="porOperario"&&(
          statsOperario.length===0
          ?<div style={{textAlign:"center",padding:40,color:"#475569"}}>Sin datos de timing registrados aún</div>
          :statsOperario.map((s,i)=>(
            <div key={s.op} style={{background:"#1e293b",borderRadius:12,padding:14,marginBottom:10,border:`1px solid ${colores[i]||"#334155"}44`}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                <div style={{background:colores[i]||"#334155",color:"#fff",borderRadius:99,width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:13}}>{i+1}</div>
                <div style={{color:"#f8fafc",fontWeight:900,fontSize:16}}>{s.op}</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                {[
                  {l:"Unidades",v:s.unidades,c:colores[i]||"#64748b"},
                  {l:"Entregas",v:s.total,c:"#3b82f6"},
                  {l:"Prom. entre entregas",v:fmtSeg(s.promSeg),c:"#22c55e"},
                ].map(k=>(
                  <div key={k.l} style={{background:"#0f172a",borderRadius:8,padding:"8px",textAlign:"center"}}>
                    <div style={{color:k.c,fontSize:18,fontWeight:900}}>{k.v}</div>
                    <div style={{color:"#475569",fontSize:9,marginTop:2}}>{k.l}</div>
                  </div>
                ))}
              </div>
            </div>
          ))
        )}

        {/* POR VARIEDAD */}
        {verTab==="variedades"&&(
          statsVariedad.length===0
          ?<div style={{textAlign:"center",padding:40,color:"#475569"}}>Sin datos registrados aún</div>
          :<>
            <div style={{color:"#64748b",fontSize:11,marginBottom:10}}>Ordenado por unidades entregadas</div>
            {statsVariedad.map((s,i)=>(
              <div key={s.vid} style={{display:"flex",alignItems:"center",gap:10,background:"#1e293b",borderRadius:8,padding:"10px 12px",marginBottom:6}}>
                <div style={{color:"#475569",fontSize:12,width:20,textAlign:"center"}}>{i+1}</div>
                <div style={{flex:1}}>
                  <div style={{color:"#f8fafc",fontWeight:700,fontSize:13}}>{s.nombre}</div>
                  <div style={{color:"#64748b",fontSize:11}}>{s.entregas} entregas</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{color:"#a78bfa",fontWeight:900,fontSize:16}}>{s.unidades} u.</div>
                  <div style={{color:"#22c55e",fontSize:11}}>⏱ {fmtSeg(s.prom)}</div>
                </div>
              </div>
            ))}
          </>
        )}
      </div>
    </div>
  );
}

// ── REPORTE ADMIN ─────────────────────────────────────────────────────────────
function Reporte({pedidos, modifs, operario}){
  const [verTab,setVerTab]=useState("resumen");
  const [verDashboard,setVerDashboard]=useState(false);

    const totalPed=pedidos.length;
  const entregadosOk=pedidos.filter(p=>estadoItem(p)==="completo"&&!p.esFaltante&&!p.esAgregado).length;
  const faltantes=modifs.filter(m=>m.tipoMod==="faltante");
  const agregados=modifs.filter(m=>m.tipoMod==="agregado_manual");

    const clientesUnicos=[...new Set(modifs.map(m=>m.cliente))];
  const porCliente=clientesUnicos.map(cliente=>{
    const mods=modifs.filter(m=>m.cliente===cliente);
    const falt=mods.filter(m=>m.tipoMod==="faltante");
    const agreg=mods.filter(m=>m.tipoMod==="agregado_manual");
    return {cliente,falt,agreg};
  });

  const exportarTSV=()=>{
    const fecha=new Date().toLocaleDateString("es-AR");
    const hora=new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"});
    const fechaHora=`${fecha} ${hora}`;
        let tsv="Fecha\tOperario\tCliente\tPosición\tMarca\tProducto\tCant. Pedida\tCant. Entregada\tEstado\n";
        pedidos.forEach(p=>{
      const estado=p.esFaltante?"FALTANTE":p.esAgregado?"AGREGADO MANUAL":estadoItem(p)==="completo"?"OK":"PENDIENTE";
      const marca=ORDEN_MARCAS.find(m=>m.id===p.marcaId)?.label||p.marcaId;
      tsv+=`${fechaHora}\t${operario}\t${p.cliente}\t${p.posicion||"—"}\t${marca}\t${p.productoNombre}\t${p.cantidad}\t${p.entregado}\t${estado}\n`;
    });
        if(modifs.length>0){
      tsv+="\n";
      tsv+="Fecha\tOperario\tCliente\tPosición\tProducto\tCant. Original\tCant. Real\tTipo\n";
      modifs.forEach(m=>{
        tsv+=`${fechaHora}\t${operario}\t${m.cliente}\t${m.posicion||"—"}\t${m.variedad}\t${m.cantOriginal}\t${m.cantReal}\t${m.tipoMod==="faltante"?"FALTANTE":"AGREGADO MANUAL"}\n`;
      });
    }
    const b=new Blob(["\ufeff"+tsv],{type:"text/tab-separated-values;charset=utf-8"});
    const u=URL.createObjectURL(b);const a=document.createElement("a");
    a.href=u;a.download=`wms_${fecha.replace(/\//g,"-")}_${operario}.tsv`;a.click();URL.revokeObjectURL(u);
  };

  const exportar=()=>{
    const fecha=new Date().toLocaleDateString("es-AR");
    const hora=new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"});
    let txt=`╔══════════════════════════════════════════════╗\n`;
    txt+=`  REPORTE DE DISTRIBUCIÓN — ${fecha} ${hora}\n`;
    txt+=`╚══════════════════════════════════════════════╝\n\n`;
    txt+=`  Total ítems:     ${totalPed}\n`;
    txt+=`  Entregados OK:   ${entregadosOk}\n`;
    txt+=`  Con faltantes:   ${faltantes.length}\n`;
    txt+=`  Agregados extra: ${agregados.length}\n\n`;

    if(faltantes.length>0){
      txt+=`━━━ FALTANTES ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
      txt+=`  Hay ${faltantes.length} ítem/s que NO se entregaron completos.\n`;
      txt+=`  Estos clientes deben recibir nota de crédito o reposición:\n\n`;
      const porCliF={};
      faltantes.forEach(m=>{if(!porCliF[m.cliente])porCliF[m.cliente]=[];porCliF[m.cliente].push(m);});
      Object.entries(porCliF).forEach(([cli,ms])=>{
        txt+=`  📦 ${cli}\n`;
        ms.forEach(m=>{txt+=`     ✗ ${m.variedad}\n       Pedido: ${m.cantOriginal} → Entregado: ${m.cantReal} (faltan ${m.cantOriginal-m.cantReal})\n       Pos: ${m.posicion||"—"}\n\n`;});
      });
    }

    if(agregados.length>0){
      txt+=`━━━ PRODUCTOS AGREGADOS MANUALMENTE ━━━━━━━━━━━\n`;
      txt+=`  Estos clientes recibieron MÁS producto del pedido.\n`;
      txt+=`  Revisar si corresponde ajustar facturación:\n\n`;
      const porCliA={};
      agregados.forEach(m=>{if(!porCliA[m.cliente])porCliA[m.cliente]=[];porCliA[m.cliente].push(m);});
      Object.entries(porCliA).forEach(([cli,ms])=>{
        txt+=`  📦 ${cli}\n`;

    const b=new Blob([txt],{type:"text/plain;charset=utf-8"});
    const u=URL.createObjectURL(b);const a=document.createElement("a");
    a.href=u;a.download=`reporte_admin_${fecha.replace(/\//g,"-")}.txt`;a.click();URL.revokeObjectURL(u);
  };

// ── LOGIN CON RECUPERACIÓN ────────────────────────────────────────────────────
function LoginConRecuperacion({onLogin, onRetomar}){
  const [sesionActiva,setSesionActiva]=useState(null); // {sid, creadoPor, pct, ts}
  const [operarioSeleccionado,setOperarioSeleccionado]=useState(null);
  const [cargando,setCargando]=useState(true);

  // Buscar última sesión activa del día en Firebase
  useEffect(()=>{
    const hoy=new Date().toDateString();
    window.db.ref("sesiones").limitToLast(10).once("value",snap=>{
      let ultima=null;
      snap.forEach(s=>{
        const d=s.val();
        if(!d||!d.ts) return;
        // Solo sesiones de hoy y con pedidos
        if(new Date(d.ts).toDateString()!==hoy) return;
        if(!d.pedidos) return;
        const pedidos=Object.values(d.pedidos);
        const completos=pedidos.filter(p=>p.entregado>0).length;
        const pct=pedidos.length?Math.round(completos/pedidos.length*100):0;
        ultima={sid:s.key, creadoPor:d.creadoPor||"?", pct, total:pedidos.length, ts:d.ts};
      });
      setSesionActiva(ultima);
      setCargando(false);
    }).catch(()=>setCargando(false));
  },[]);

  const handleRetomar=(op)=>{
    if(sesionActiva) onRetomar(op, sesionActiva.sid);
  };

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{width:"100%",maxWidth:300}}>

        {/* Banner sesión recuperable */}
        {!cargando&&sesionActiva&&(
          <div style={{background:"#1e3a5f",border:"2px solid #3b82f6",borderRadius:14,padding:16,marginBottom:20,animation:"popIn 0.3s ease"}}>
            <div style={{color:"#93c5fd",fontSize:13,fontWeight:800,marginBottom:6}}>🔄 Jornada en curso encontrada</div>
            <div style={{color:"#94a3b8",fontSize:12,marginBottom:2}}>
              Cargada por: <strong style={{color:"#f8fafc"}}>{sesionActiva.creadoPor}</strong>
            </div>
            <div style={{color:"#94a3b8",fontSize:12,marginBottom:12}}>
              Progreso: <strong style={{color:"#22c55e"}}>{sesionActiva.pct}%</strong> · {sesionActiva.total} ítems
            </div>
            {operarioSeleccionado ? (
              <div>
                <div style={{color:"#f8fafc",fontSize:12,marginBottom:8,fontWeight:700}}>¿Querés retomar como {operarioSeleccionado}?</div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>handleRetomar(operarioSeleccionado)} style={{flex:1,background:"#3b82f6",color:"#fff",border:"none",borderRadius:8,padding:"10px",fontSize:13,fontWeight:800,cursor:"pointer"}}>↩ Retomar</button>
                  <button onClick={()=>onLogin(operarioSeleccionado)} style={{flex:1,background:"transparent",color:"#64748b",border:"1px solid #334155",borderRadius:8,padding:"10px",fontSize:12,cursor:"pointer"}}>Nueva jornada</button>
                </div>
              </div>
            ) : (
              <div style={{color:"#64748b",fontSize:11}}>Seleccioná tu nombre abajo para retomar</div>
            )}
          </div>
        )}

        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:52}}>📦</div>
          <h1 style={{color:"#f8fafc",fontSize:26,fontWeight:900,letterSpacing:-1,margin:"8px 0 4px"}}>WMS Picking</h1>
          <p style={{color:"#64748b",fontSize:13}}>La Francia Panificación</p>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {["Pablo","Brian","David","Adrián"].map(op=>(
            <button key={op}
              onClick={()=>{
                if(sesionActiva) setOperarioSeleccionado(op);
                else onLogin(op);
              }}
              style={{background:operarioSeleccionado===op?"#1e3a5f":"#1e293b",color:"#f8fafc",border:`1px solid ${operarioSeleccionado===op?"#3b82f6":"#334155"}`,borderRadius:10,padding:"14px",fontSize:16,fontWeight:700,cursor:"pointer"}}>
              👤 {op}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}
